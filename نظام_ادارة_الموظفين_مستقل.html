    (locked && can('reopenPayroll') ? '<button class="btn btn-gold" onclick="reopenOffFile(\''+id+'\')">🔓 إعادة فتح (صلاحية خاصة)</button>':''));
  var m=document.querySelector('.modal-bg .modal'); if(m) m.classList.add('wide');
}
function offField(id,k,v){ var o=offGet(id); if(!o||o.fileStatus==='مغلق') return; if(k==='exitInterviewDone'){ o.exitInterview=o.exitInterview||{}; o.exitInterview.done=v; } else if(k==='expCert'){ o.experienceCert=o.experienceCert||{}; o.experienceCert.issued=v; } else { o[k]=v; } saveDB(); openOff(id); }
function offClear(id,i,v){ var o=offGet(id); if(!o||o.fileStatus==='مغلق') return; o.clearance[i].cleared=v; o.clearance[i].by=v?(DB.lastUser||'—'):''; o.clearance[i].date=v?today().iso:''; saveDB(); openOff(id); }
function offClearNote(id,i,v){ var o=offGet(id); if(!o) return; o.clearance[i].note=v; saveDB(); }
function closeOffFile(id){
  if(!can('editEmp')) return toast('لا صلاحية','error');
  var o=offGet(id); if(!o) return; var g=offGates(o);
  if(!g.all){
    var miss=[]; if(!g.custodyOk)miss.push('تسليم العهد'); if(!g.loansOk)miss.push('تسوية السلف والقروض'); if(!g.hrOk)miss.push('اعتماد الموارد البشرية'); if(!g.finOk)miss.push('اعتماد الإدارة المالية');
    return toast('لا يمكن الإغلاق — ناقص: '+miss.join('، '),'error');
  }
  if(!confirm('إغلاق ملف الموظف نهائياً؟ سيتم أرشفة الموظف.')) return;
  o.fileStatus='مغلق'; o.closedAt=new Date().toISOString(); o.closedBy=DB.lastUser||'—';
  var e=getEmp(o.nationalId); if(e){ e.status='منتهي الخدمة'; e.archived=true; e.archivedAt=new Date().toISOString(); e.archivedBy=DB.lastUser||'—'; }
  logChange(e,'إغلاق ملف إنهاء الخدمة', o.id+' — تمت التسوية والاعتمادات');
  saveDB(); toast('🔒 تم إغلاق الملف وأرشفة الموظف','success'); openOff(id); renderOffboard();
}

function hrAbsenceLate(mode){
  var ym=hrMonth||today().iso.slice(0,7);
  var rows=DB.employees.filter(function(e){ return !e.archived; }).map(function(e){
    var recs=(DB.attendance||[]).filter(function(r){ return r.nationalId===e.nationalId && String(r.date||'').indexOf(ym)===0; }).map(attNorm);
    var absent=recs.filter(function(r){ return r.status==='غائب'; }).length;
    var lateCount=recs.filter(function(r){ return (r.lateMin||0)>0; }).length;
    var lateH=r2(recs.reduce(function(s,r){ return s+((r.lateMin||0)/60); },0));
    var earlyH=r2(recs.reduce(function(s,r){ return s+((r.earlyLeaveMin||0)/60); },0));
    return [e.empNo,e.fullNameAr,e.dept||'—',absent,lateCount,lateH,earlyH];
  }).filter(function(r){ return r[3]||r[4]||r[5]||r[6]; });
  var H=['رقم الموظف','الاسم','القسم','أيام الغياب','مرات التأخير','ساعات التأخير','ساعات الخروج المبكر'];
  mode==='csv'?csvDL('الغياب_والتأخير_'+ym,H,rows):printTable('تقرير الغياب والتأخير — '+ym,H,rows);
}
function hrAllowances(mode){
  if(!can('viewSalary')) return toast('لا صلاحية','error');
  var rows=DB.employees.filter(function(e){ return !e.archived && e.salary; }).map(function(e){ var s=e.salary; return [e.fullNameAr,s.housing||0,s.transport||0,s.phone||0,s.mgmt||0,s.nature||0,s.other||0,s.totalAllow||0]; });
  var H=['الموظف','السكن','المواصلات','الهاتف','الإدارة','طبيعة العمل','أخرى','إجمالي البدلات'];
  mode==='csv'?csvDL('تقرير_البدلات',H,rows):printTable('تقرير البدلات',H,rows);
}
function hrDeductions(mode){
  if(!can('viewSalary')) return toast('لا صلاحية','error');
  var run=(DB.payrolls||[]).slice().sort(function(a,b){ return (b.year*100+b.month)-(a.year*100+a.month); })[0];
  if(!run){ return toast('لا يوجد مسير رواتب — أنشئ مسيراً أولاً','error'); }
  var rows=(run.lines||[]).map(function(l){ return [l.name,l.absenceDeduct||0,l.lateDeduct||0,l.socialSecurity||0,l.incomeTax||0,l.advance||0,l.loan||0,l.otherDeduct||0,l.totalDeductions||0]; });
  var H=['الموظف','خصم غياب','خصم تأخير','الضمان','ض.الدخل','السلف','القروض','خصومات أخرى','إجمالي الاستقطاعات'];
  mode==='csv'?csvDL('تقرير_الخصومات_'+run.month+'-'+run.year,H,rows):printTable('تقرير الخصومات — مسير '+run.id+' ('+run.month+'/'+run.year+')',H,rows);
}
function hrLoans(mode){
  if(!can('viewSalary')) return toast('لا صلاحية','error');
  var rows=(DB.loans||[]).map(function(l){ return [l.id,empName(l.nationalId),l.type,l.date,l.amount||0,loanInstallment(l),r2(loanPaid(l)),loanRemaining(l),l.status]; });
  var H=['رقم السلفة','الموظف','النوع','التاريخ','القيمة','القسط','المسدَّد','المتبقي','الحالة'];
  mode==='csv'?csvDL('السلف_والقروض',H,rows):printTable('تقرير السلف والقروض',H,rows);
}

}
function importJSON(ev){
  const file=ev.target.files[0]; if(!file) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ const d=JSON.parse(rd.result);
    if(!d || typeof d!=='object' || !Array.isArray(d.employees)) throw new Error('bad');
    var cnt=(Array.isArray(DB.employees)?DB.employees.length:0);
    if(!confirm('⚠️ حماية من الكتابة فوق البيانات\n\nالاستعادة ستستبدل كل البيانات الحالية ('+cnt+' موظف + الوثائق) بمحتوى ملف النسخة الاحتياطية.\nسيتم حفظ لقطة تراجُع تلقائياً. هل تريد المتابعة؟')) { ev.target.value=''; return; }
    if(cnt>0 && !confirm('تأكيد نهائي: سيتم استبدال بيانات '+cnt+' موظف. اكتب موافق بالضغط على OK.')) { ev.target.value=''; return; }
    try{ localStorage.setItem('ems_standalone_v1__prev', localStorage.getItem('ems_standalone_v1')||''); }catch(x){}
    Store.snapshotPrev(); /* لقطة تراجُع في IndexedDB */
    DB=d; delete DB.__backup; delete DB.__version; delete DB.__backupAt;
    DB.employees=DB.employees||[]; DB.attendance=DB.attendance||[]; DB.leaves=DB.leaves||[]; DB.auditLog=DB.auditLog||[];
    migrateDB(); saveDB(); setTab('employees'); toast('✓ تمت الاستعادة الكاملة بنجاح (لقطة تراجُع محفوظة)','success');
  }catch(e){ toast('ملف نسخة احتياطية غير صالح','error'); } ev.target.value=''; };
  rd.readAsText(file);
}

/* ==================== التصميم المتجاوب: تحويل الجداول إلى بطاقات على الشاشات الصغيرة ==================== */
function applyRespTables(root){
  try{
    (root||document).querySelectorAll('.tblwrap table').forEach(function(tb){
      var ths=tb.querySelectorAll('thead th'); if(!ths.length) return;
      var labels=[].map.call(ths,function(th){ return th.textContent.replace(/\s+/g,' ').trim(); });
      tb.querySelectorAll('tbody tr').forEach(function(tr){
        [].forEach.call(tr.children,function(td,i){
          if(td.hasAttribute('data-label')) return;
          if(td.hasAttribute('colspan')){ td.setAttribute('data-label',''); return; }
          td.setAttribute('data-label', labels[i]||'');
        });
      });
    });
  }catch(e){}
}
function initRespTables(){
  applyRespTables(document);
  try{
    var obs=new MutationObserver(function(){ applyRespTables($('view')); var mb=$('modalBody'); if(mb) applyRespTables(mb); });
    var v=$('view'); if(v) obs.observe(v,{childList:true,subtree:true});
    var mb=$('modalBody'); if(mb) obs.observe(mb,{childList:true,subtree:true});
  }catch(e){}
}

/* ==================== الإقلاع (تحميل من IndexedDB أولاً ثم التهيئة) ==================== */
(function boot(){
  Store.load().then(function(loaded){
    if(loaded && Array.isArray(loaded.employees)) DB=loaded;
    DB.employees=DB.employees||[]; DB.attendance=DB.attendance||[]; DB.leaves=DB.leaves||[]; DB.auditLog=DB.auditLog||[];
    migrateDB();
    if(!DB.roles){ DB.roles={
      'مدير النظام': allPerms(true),
      'موارد بشرية': {viewEmployees:1,addEmp:1,editEmp:1,delEmp:0,viewSalary:1,editSalary:1,viewDocs:1,uploadDocs:1,delDocs:1,viewContracts:1,editContracts:1,export:1,reopenPayroll:0},
      'مشرف (عرض فقط)': {viewEmployees:1,addEmp:0,editEmp:0,delEmp:0,viewSalary:0,editSalary:0,viewDocs:1,uploadDocs:0,delDocs:0,viewContracts:1,editContracts:0,export:0,reopenPayroll:0}
    }; }
    if(!DB.currentRole){ DB.currentRole='مدير النظام'; }
    Store.save(DB); /* ضمان وجود نسخة محدثة في IndexedDB */
    setTab('employees');
    initRespTables();
    setTimeout(function(){ var rl=$('roleLbl'); if(rl) rl.textContent=roleBadge(); refreshAlerts(); var n=expiringList().length; if(n) toast('🔔 لديك '+n+' عقد قارب على الانتهاء أو انتهى','error'); }, 500);
  }).catch(function(err){ console.error('boot',err); migrateDB(); setTab('employees'); });
})();
</script>
