<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>نظام إدارة الموظفين</title>
<style>
  :root{
    --navy:#0E4A73; --navy-d:#082B45; --blue:#2E8BC4; --gold:#4FA8DC; --gold-d:#1E6FA8;
    --green:#1a8a5a; --red:#a83232; --orange:#c47a1d; --line:#D6E8F2; --line-2:#EAF4FA;
    --paper:#fff; --cream:#F2F8FC; --ink:#16242F; --soft:#54707F;
  }
  *{box-sizing:border-box;font-family:"Segoe UI",Tahoma,Arial,sans-serif}
  body{margin:0;background:var(--cream);color:var(--ink)}
  a{color:inherit}
  /* ===== Topbar ===== */
  .topbar{background:linear-gradient(160deg,var(--navy),var(--gold-d));color:#fff;padding:14px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;box-shadow:0 6px 18px rgba(14,74,115,.20)}
  .brand{display:flex;align-items:center;gap:12px}
  .brand-logo{width:46px;height:46px;border-radius:13px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;border:1px solid rgba(255,255,255,.3)}
  .brand h1{font-size:19px;margin:0;font-weight:800}
  .brand p{font-size:11.5px;margin:2px 0 0;opacity:.85}
  .top-tools{margin-inline-start:auto;display:flex;gap:8px;flex-wrap:wrap}
  .top-btn{background:rgba(255,255,255,.14);color:#fff;border:1px solid rgba(255,255,255,.25);border-radius:9px;padding:8px 12px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit}
  .top-btn:hover{background:rgba(255,255,255,.24)}
  /* ===== Tabs ===== */
  .tabs{display:flex;gap:8px;flex-wrap:wrap;padding:14px 20px 0;max-width:1150px;margin:0 auto}
  .tab{background:#fff;border:1px solid var(--line);border-bottom:none;border-radius:12px 12px 0 0;padding:11px 18px;font-size:14px;font-weight:800;color:var(--soft);cursor:pointer;font-family:inherit;transition:.15s}
  .tab.active{color:var(--navy);background:linear-gradient(180deg,#eaf4fb,#fff);box-shadow:0 -3px 10px rgba(14,74,115,.06)}
  .tab:hover{color:var(--navy)}
  /* ===== Content ===== */
  .wrap{max-width:1150px;margin:0 auto;padding:0 20px 50px}
  .card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 10px 26px rgba(14,74,115,.10);margin-top:14px}
  .card-h{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;border-bottom:1px solid var(--line-2);padding-bottom:12px;margin-bottom:16px}
  .card-h h2{font-size:16px;margin:0;color:var(--navy);font-weight:800}
  .grid{display:grid;gap:14px}
  .g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:repeat(4,1fr)}
  label{display:block;font-size:12.5px;font-weight:800;color:var(--navy);margin-bottom:6px}
  .req{color:var(--red)}
  input,select,textarea{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:11px;font-size:14px;font-weight:700;font-family:inherit;background:#fbfdff;color:var(--ink);outline:none;transition:.15s}
  input:focus,select:focus,textarea:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(79,168,220,.18);background:#fff}
  input[readonly]{background:var(--cream);color:var(--navy)}
  .btn{border:none;border-radius:11px;padding:10px 18px;font-size:13.5px;font-weight:800;font-family:inherit;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:6px}
  .btn-primary{color:#fff;background:linear-gradient(145deg,var(--navy),var(--gold-d));box-shadow:0 7px 16px rgba(14,74,115,.26)}
  .btn-gold{color:#5a3a00;background:linear-gradient(145deg,#ffe08a,#f5b73d)}
  .btn-ghost{background:#eef6fb;color:var(--navy);border:1px solid var(--line)}
  .btn-danger{color:#fff;background:linear-gradient(145deg,#e06666,var(--red))}
  .btn:hover{transform:translateY(-1px)}
  .btn-sm{padding:6px 11px;font-size:12px}
  .row-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .icon-btn{border:none;background:#eef6fb;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:14px}
  .icon-btn.danger{background:#fdecec}
  /* ===== Table ===== */
  .tblwrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:640px}
  th,td{border:1px solid var(--line);padding:9px 10px;text-align:right;vertical-align:middle}
  thead th{background:#e8f4fd;color:var(--navy);font-weight:800;white-space:nowrap}
  tbody tr:nth-child(even){background:#f7fbfe}
  tbody tr:hover{background:#eef7ee}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:800}
  .badge.green{background:#e6faf0;color:var(--green)}.badge.red{background:#fdecec;color:var(--red)}.badge.gray{background:#eef2f5;color:var(--soft)}
  .num{font-variant-numeric:tabular-nums}
  .empty{text-align:center;color:var(--soft);padding:34px 10px}
  .empty-icon{font-size:34px;margin-bottom:8px}
  .hint{font-size:11.5px;color:var(--soft);margin-top:4px;font-weight:600}
  .hours-box{background:#eef6fb;border:1px solid var(--line);border-radius:10px;padding:10px 14px;text-align:center;margin:6px 0 14px;font-weight:700;color:var(--soft)}
  .hours-box b{font-size:19px;color:var(--navy)}
  /* ===== Modal ===== */
  .modal-bg{position:fixed;inset:0;background:rgba(13,37,52,.55);display:none;align-items:center;justify-content:center;z-index:500;padding:16px}
  .modal-bg.show{display:flex}
  .modal{background:#fff;border-radius:18px;width:100%;max-width:640px;box-shadow:0 24px 60px rgba(0,0,0,.3);max-height:92vh;overflow:auto}
  .modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--line)}
  .modal-head h3{margin:0;font-size:16px;color:var(--navy)}
  .modal-close{border:none;background:none;font-size:26px;line-height:1;color:var(--soft);cursor:pointer}
  .modal-body{padding:20px}
  .modal-foot{display:flex;gap:10px;justify-content:flex-start;padding:14px 20px;border-top:1px solid var(--line)}
  /* ===== Toast ===== */
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:12px 20px;border-radius:12px;font-weight:700;font-size:13.5px;opacity:0;pointer-events:none;transition:.25s;z-index:900;box-shadow:0 10px 26px rgba(0,0,0,.25)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.error{background:var(--red)} .toast.success{background:var(--green)}
  @media(max-width:720px){ .g2,.g3,.g4{grid-template-columns:1fr} .wrap,.tabs{padding-left:12px;padding-right:12px} }
  /* ===== تحويل الجداول الكبيرة إلى بطاقات على الشاشات الصغيرة (هواتف/تابلت صغير) ===== */
  @media(max-width:760px){
    .tblwrap{overflow-x:visible;-webkit-overflow-scrolling:auto}
    .tblwrap table{min-width:0;font-size:13px;border:0;display:block}
    .tblwrap table thead{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0}
    .tblwrap table tbody{display:block}
    .tblwrap table tr{display:block;background:#fff;border:1px solid var(--line);border-radius:12px;padding:8px 12px;margin-bottom:10px;box-shadow:0 4px 12px rgba(14,74,115,.07)}
    .tblwrap table td{display:flex;justify-content:space-between;gap:12px;align-items:center;border:0;border-bottom:1px dashed var(--line-2);padding:8px 0;text-align:left;min-width:0;white-space:normal}
    .tblwrap table td:last-child{border-bottom:0}
    .tblwrap table td::before{content:attr(data-label);font-weight:800;color:var(--navy);text-align:right;flex:0 0 42%;font-size:11.5px;white-space:normal}
    .tblwrap table td[data-label=""]::before{content:none}
    .tblwrap table td[data-label=""]{justify-content:center}
    .tblwrap table td[colspan]{justify-content:center}
    .tblwrap table td[colspan]::before{content:none}
  }
  @media(max-width:480px){
    .wrap{padding-left:10px;padding-right:10px}
    .card{padding:14px;border-radius:14px}
    .card-h h2{font-size:15px}
    .tabs .tab{font-size:12.5px;padding:8px 10px}
    .top-btn{font-size:12px}
    .rep-grid{grid-template-columns:1fr}
  }
  .toolbar{display:flex;gap:8px;flex-wrap:wrap}
  .filter-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;background:#f3fafe;border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:12px}
  .emp-thumb{width:38px;height:38px;border-radius:9px;object-fit:cover;border:1px solid var(--line);background:#eef6fb;display:inline-block}
  .emp-thumb-ph{display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--soft)}
  .photo-preview{width:96px;height:96px;border-radius:14px;object-fit:cover;border:1px solid var(--line);background:#eef6fb}
  .profile{display:flex;gap:18px;flex-wrap:wrap}
  .profile-photo{width:120px;height:120px;border-radius:16px;object-fit:cover;border:2px solid var(--line);background:#eef6fb;display:flex;align-items:center;justify-content:center;font-size:42px;color:var(--soft);flex:0 0 auto}
  .profile-fields{flex:1;min-width:240px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .pf{background:var(--cream);border:1px solid var(--line);border-radius:10px;padding:7px 10px}
  .pf label{font-size:10.5px;color:var(--soft);margin:0 0 2px;font-weight:800}
  .pf div{font-size:13px;font-weight:700;color:var(--ink);word-break:break-word}
  .docs-list{margin-top:14px}
  .doc-item{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:7px 12px;margin-bottom:6px}
  .doc-item .name{flex:1;font-size:12.5px;font-weight:700;word-break:break-word}
  @media(max-width:600px){.profile-fields{grid-template-columns:1fr}}
  .prof-summary{display:flex;gap:16px;align-items:center;flex-wrap:wrap;background:linear-gradient(160deg,#eaf4fb,#f4faff);border:1px solid var(--line);border-radius:14px;padding:14px 16px;margin-bottom:14px}
  .prof-sum-photo{width:64px;height:64px;border-radius:14px;object-fit:cover;border:1px solid var(--line);background:#eef6fb;display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--soft);flex:0 0 auto}
  .prof-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;border-bottom:1px solid var(--line);padding-bottom:10px}
  .prof-tab{background:#eef6fb;border:1px solid var(--line);border-radius:9px;padding:7px 12px;font-size:12.5px;font-weight:800;color:var(--soft);cursor:pointer;font-family:inherit}
  .prof-tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .modal.wide{max-width:920px}
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:14px}
  .kpi{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:0 6px 16px rgba(14,74,115,.08);transition:.15s}
  .kpi:hover{box-shadow:0 10px 22px rgba(14,74,115,.15);transform:translateY(-1px)}
  .kpi-ic{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex:0 0 auto}
  .kpi-val{font-size:23px;font-weight:900;line-height:1}
  .kpi-lb{font-size:12px;color:var(--soft);font-weight:700;margin-top:3px}
  .rep-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}
  .rep-card{background:#f7fbff;border:1px solid var(--line);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:10px;justify-content:space-between}
  .rep-lb{font-weight:800;color:var(--navy);font-size:14px}
  .rep-btns{display:flex;gap:8px;flex-wrap:wrap}
  .att-metric{background:#f4faff;border:1px solid var(--line);border-radius:10px;padding:8px 12px;display:flex;justify-content:space-between;align-items:center}
  .att-metric span{font-size:11.5px;color:var(--soft);font-weight:700}
  .att-metric b{font-size:16px;color:var(--navy)}
  .lv-steps{display:flex;align-items:center;gap:4px;flex-wrap:wrap;background:#f4faff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:12px}
  .lv-step{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:64px}
  .lv-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;background:#e6ecf1;color:var(--soft)}
  .lv-step.done .lv-dot{background:#1a8a5a;color:#fff}
  .lv-step.cur .lv-dot{background:var(--gold);color:#fff;box-shadow:0 0 0 3px rgba(79,168,220,.25)}
  .lv-lb{font-size:10.5px;font-weight:700;color:var(--soft);text-align:center}
  .lv-step.done .lv-lb,.lv-step.cur .lv-lb{color:var(--navy)}
  .lv-line{flex:1;height:2px;background:var(--line);min-width:14px}
  .off-gate{display:flex;align-items:center;gap:8px;background:#f4faff;border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-weight:700;font-size:13px}
</style>
</head>
<body>

  <div class="topbar">
    <div class="brand">
      <div class="brand-logo">👥</div>
      <div><h1>نظام إدارة الموظفين</h1><p>إدارة بيانات الموظفين والدوام والمغادرات</p></div>
    </div>
    <div class="top-tools">
      <button class="top-btn" onclick="setTab('perms')" title="الدور الحالي / الصلاحيات"><span id="roleLbl"></span></button>
      <button class="top-btn" id="bellBtn" onclick="showAlerts()" title="تنبيهات العقود">🔔 <span id="bellCount">0</span></button>
      <button class="top-btn" onclick="fullBackup()">💾 نسخة احتياطية</button>
      <button class="top-btn" onclick="triggerRestore()">♻️ استعادة</button>
      <input type="file" id="impFile" accept=".json" style="display:none" onchange="importJSON(event)">
    </div>
  </div>

  <div class="tabs">
    <button class="tab" id="tab-employees" onclick="setTab('employees')">👥 الموظفون</button>
    <button class="tab" id="tab-attendance" onclick="setTab('attendance')">🕐 تسجيل الدوام</button>
    <button class="tab" id="tab-leaves" onclick="setTab('leaves')">🚪 طلبات المغادرة</button>
    <button class="tab" id="tab-audit" onclick="setTab('audit')">🧾 سجل التدقيق</button>
    <button class="tab" id="tab-payroll" onclick="setTab('payroll')">💵 الرواتب</button>
    <button class="tab" id="tab-loans" onclick="setTab('loans')">💳 السلف والقروض</button>
    <button class="tab" id="tab-offboard" onclick="setTab('offboard')">🚪 إنهاء الخدمة</button>
    <button class="tab" id="tab-hr" onclick="setTab('hr')">📊 لوحة HR</button>
    <button class="tab" id="tab-reports" onclick="setTab('reports')">📈 التقارير</button>
    <button class="tab" id="tab-perms" onclick="setTab('perms')">🔐 الصلاحيات</button>
  </div>

  <div class="wrap"><div id="view"></div></div>

  <!-- Modal -->
  <div class="modal-bg" id="modalBg">
    <div class="modal">
      <div class="modal-head"><h3 id="modalTitle"></h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-foot" id="modalFoot"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
/* ==================== طبقة التخزين: IndexedDB (أساسي) + localStorage (احتياطي) ====================
   المرفقات والوثائق قد تكون كبيرة، وتخزين localStorage محدود (~5م.ب) لذا المصدر الأساسي هو IndexedDB.
   Store طبقة مجرّدة: للانتقال لخادم مركزي متعدد المستخدمين استبدل Store.save/Store.load بنداءات REST fetch. */
const KEY = 'ems_standalone_v1';
const IDB_NAME='ems_db_v1', IDB_STORE='kv', IDB_MAIN='main', IDB_PREV='main__prev';
let _idb=null, IDB_OK=(typeof indexedDB!=='undefined');
function idbOpen(){ return new Promise(function(res,rej){ if(_idb) return res(_idb); if(!IDB_OK) return rej(new Error('no-idb')); try{ var rq=indexedDB.open(IDB_NAME,1); rq.onupgradeneeded=function(e){ var db=e.target.result; if(!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE); }; rq.onsuccess=function(e){ _idb=e.target.result; res(_idb); }; rq.onerror=function(){ rej(rq.error); }; }catch(err){ rej(err); } }); }
function idbGet(key){ return idbOpen().then(function(db){ return new Promise(function(res,rej){ var r=db.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(key); r.onsuccess=function(){res(r.result);}; r.onerror=function(){rej(r.error);}; }); }); }
function idbPut(key,val){ return idbOpen().then(function(db){ return new Promise(function(res,rej){ var r=db.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).put(val,key); r.onsuccess=function(){res(true);}; r.onerror=function(){rej(r.error);}; }); }); }
const Store={
  backend:'indexeddb', /* مستقبلاً: 'server' */
  save:function(obj){ var str=JSON.stringify(obj); var p=IDB_OK?idbPut(IDB_MAIN,str).catch(function(e){ console.warn('IDB save failed',e); }):Promise.resolve();
    try{ localStorage.setItem(KEY, str); }catch(e){ /* امتلأت localStorage — IndexedDB هو المصدر */ } return p; },
  load:function(){ if(!IDB_OK){ return Promise.resolve(loadDB()); }
    return idbGet(IDB_MAIN).then(function(v){ if(v){ try{ return JSON.parse(v); }catch(e){} }
      /* أول تشغيل بعد الترقية: ترحيل بيانات المستخدم من localStorage القديمة إلى IndexedDB دون فقدان */
      try{ var ls=localStorage.getItem(KEY); if(ls){ idbPut(IDB_MAIN, ls); return JSON.parse(ls); } }catch(e){}
      return {}; }).catch(function(){ return loadDB(); }); },
  snapshotPrev:function(){ if(!IDB_OK) return Promise.resolve(); try{ return idbPut(IDB_PREV, JSON.stringify(DB)); }catch(e){ return Promise.resolve(); } }
};
function loadDB(){ try{ return JSON.parse(localStorage.getItem(KEY)) || {}; }catch(e){ return {}; } }
let DB = loadDB();
DB.employees = DB.employees || [];
DB.attendance = DB.attendance || [];
DB.leaves = DB.leaves || [];
DB.auditLog = DB.auditLog || [];
function saveDB(){ try{ Store.save(DB); }catch(e){ toast('تعذّر الحفظ','error'); } }

/* ==================== أدوات ==================== */
const $ = (id)=>document.getElementById(id);
function esc(v){ return String(v==null?'':v).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(m,t){ const el=$('toast'); el.textContent=m; el.className='toast show '+(t||''); setTimeout(()=>el.classList.remove('show'),2600); }
function val(id){ const e=$(id); return e?e.value:''; }
function today(){ const d=new Date(),p=n=>(n<10?'0':'')+n; return {iso:d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()), human:p(d.getDate())+'/'+p(d.getMonth()+1)+'/'+d.getFullYear()}; }
function weekday(iso){ try{ return iso?new Date(iso).toLocaleDateString('ar',{weekday:'long'}):''; }catch(e){ return ''; } }
function calcHours(from,to){ if(!from||!to) return 0; const a=from.split(':').map(Number),b=to.split(':').map(Number); let m=(b[0]*60+b[1])-(a[0]*60+a[1]); if(m<0)m+=1440; return Math.round(m/60*100)/100; }
function getEmp(nid){ nid=String(nid||'').trim(); return DB.employees.find(e=>e.nationalId===nid)||null; }
function empName(nid){ const e=getEmp(nid); return e?(e.fullNameAr||e.fullName||nid):nid; }

/* ==================== Modal ==================== */
function modal(title, body, foot){ $('modalTitle').textContent=title; $('modalBody').innerHTML=body; $('modalFoot').innerHTML=foot||'<button class="btn btn-ghost" onclick="closeModal()">إغلاق</button>'; var _m=document.querySelector('.modal-bg .modal'); if(_m) _m.classList.remove('wide'); $('modalBg').classList.add('show'); }
function closeModal(){ $('modalBg').classList.remove('show'); }
$('modalBg').addEventListener('click', e=>{ if(e.target.id==='modalBg') closeModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

/* ==================== التبويبات ==================== */
let TAB='employees';
function setTab(t){
  TAB=t;
  var _rl=$('roleLbl'); if(_rl) _rl.textContent=roleBadge();
  ['employees','attendance','leaves','audit','payroll','loans','offboard','hr','reports','perms'].forEach(x=>{ var el=$('tab-'+x); if(el) el.classList.toggle('active', x===t); });
  if(t==='employees') renderEmployees();
  else if(t==='attendance') renderAttendance();
  else if(t==='leaves') renderLeaves();
  else if(t==='audit') renderAudit();
  else if(t==='payroll') renderPayroll();
  else if(t==='loans') renderLoans();
  else if(t==='offboard') renderOffboard();
  else if(t==='hr') renderHRDash();
  else if(t==='reports') renderReports();
  else renderPerms();
}

function nextEmpNo(){

}

function selOpts(arr, sel){ return arr.map(v=>'<option value="'+esc(v)+'"'+(v===sel?' selected':'')+'>'+esc(v||'— اختر —')+'</option>').join(''); }

function empSetSearch(v){ empSearch=v; renderEmpRows(); }

function filteredEmployees(){
  const q=empSearch.trim();
  return DB.employees.slice().filter(e=>{
    if(!showArchived && e.archived) return false;
    if(showArchived && !e.archived) return false;
    if(empFilter.city && (e.city||'')!==empFilter.city) return false;
    if(empFilter.nat && (e.nationality||'')!==empFilter.nat) return false;
    if(empFilter.gender && (e.gender||'')!==empFilter.gender) return false;
    if(empFilter.marital && (e.maritalStatus||'')!==empFilter.marital) return false;
    if(empFilter.status && (e.status||'')!==empFilter.status) return false;
    if(empFilter.dept && (e.dept||'')!==empFilter.dept) return false;
    if(empFilter.branch && (e.branch||'')!==empFilter.branch) return false;
    if(empFilter.job && (e.jobTitle||'')!==empFilter.job) return false;
    if(empFilter.contractType && !((e.contracts||[]).some(c=>c.type===empFilter.contractType))) return false;
    if(empFilter.hireFrom && (!(e.hireDate) || e.hireDate < empFilter.hireFrom)) return false;
    if(q){
      const hay=[e.empNo,e.fullNameAr,e.fullNameEn,e.nationalId,e.jobTitle,e.phone,e.whatsapp,e.city,e.nationality].map(x=>x||'').join(' ');
      if(hay.indexOf(q)===-1) return false;
    }
    return true;
  }).sort((a,b)=>(a.fullNameAr||'').localeCompare(b.fullNameAr||'','ar'));
}

/* ==================== حماية البيانات: الأرشفة والحذف المنطقي ==================== */
let showArchived=false;
function empTxCount(e){
  let n=0;
  n+=(e.contracts||[]).length + (e.documents||[]).length + (e.salaryHistory||[]).length + (e.ssDocs||[]).length;
  if(e.salary) n++; if(e.social) n++;
  try{ n+=(DB.attendance||[]).filter(a=>a.nationalId===e.nationalId).length; }catch(x){}
  try{ n+=(DB.leaves||[]).filter(l=>l.nationalId===e.nationalId).length; }catch(x){}
  return n;
}
function hasTransactions(e){ return empTxCount(e)>0; }
function delEmp(key){   /* الآن = حذف منطقي (أرشفة) */
  if(!can('delEmp')) return toast('لا صلاحية للحذف','error');
  const e=getEmp(key); if(!e) return;
  const tx=empTxCount(e);
  const msg = tx>0
    ? ('للموظف «'+(e.fullNameAr||'')+'» '+tx+' معاملة مرتبطة.\nسيتم أرشفته (حذف منطقي) بدل الحذف النهائي حفاظاً على البيانات. متابعة؟')
    : ('أرشفة الموظف «'+(e.fullNameAr||'')+'» (حذف منطقي قابل للاستعادة)؟');
  if(!confirm(msg)) return;
  e.archived=true; e.archivedAt=new Date().toISOString(); e.archivedBy=DB.lastUser||'—';
  logChange(e,'أرشفة موظف (حذف منطقي)', tx>0?('معاملات مرتبطة: '+tx):'');
  saveDB(); toast('🗄️ تمت أرشفة الموظف (يمكن استعادته من الأرشيف)','success'); renderEmployees();
}
function restoreEmp(key){
  if(!can('editEmp')) return toast('لا صلاحية للاستعادة','error');

/* ==================== عقود العمل (متعددة + سجل تاريخي) ==================== */
function monthsBetween(start,end){
  if(!start||!end) return '';
  const a=new Date(start), b=new Date(end); if(isNaN(a)||isNaN(b)||b<a) return '';
  let months=(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth());
  if(b.getDate()<a.getDate()) months--;
  const days=Math.round((b-a)/86400000);
  if(months<1) return days+' يوم';
  const y=Math.floor(months/12), m=months%12;
  return (y?y+' سنة ':'')+(m?m+' شهر':'')||(months+' شهر');
}
function cAutoDur(){ const el=$('c_duration'); if(el) el.value=monthsBetween($('c_start').value,$('c_end').value); }

const ALERT_DAYS=30;
const DOC_ALERT_DAYS=90;
function daysLeft(dstr){ if(!dstr) return null; const t=new Date(); t.setHours(0,0,0,0); const d=new Date(dstr); if(isNaN(d)) return null; return Math.round((d-t)/86400000); }
function alertLabel(dl){ return dl<0?('منتهٍ منذ '+Math.abs(dl)+' يوم'): dl===0?'ينتهي اليوم':('يتبقّى '+dl+' يوم'); }
function alertMark(c){ if(!c||!c.end||c.status==='ملغى') return ''; const dl=daysLeft(c.end); if(dl===null||dl>ALERT_DAYS) return ''; return ' <span title="'+alertLabel(dl)+'" style="color:'+(dl<0?'#a83232':'#c47a1d')+'">⚠️</span>'; }
function docTierColor(dl){ return dl<=30?'#a83232': dl<=60?'#c47a1d':'#8a6d0b'; }
function docTierLabel(dl){ return dl<0?('منتهية منذ '+Math.abs(dl)+' يوم'): dl===0?'تنتهي اليوم': dl<=30?('خلال 30 يوماً ('+dl+')'): dl<=60?('خلال 60 يوماً ('+dl+')'):('خلال 90 يوماً ('+dl+')'); }

  return out.sort((a,b)=>a.dl-b.dl);

function saveContract(key){
  if(!can('editContracts')) return toast('لا صلاحية لتعديل العقود','error');
  const e=getEmp(key); if(!e) return; e.contracts=e.contracts||[];
  const no=val('c_no').trim(), start=val('c_start');
  if(!no && !start) return toast('أدخل رقم العقد أو تاريخ البداية على الأقل','error');
  e.contracts.unshift({
    id:'ct_'+Date.now(), no, type:val('c_type'), status:val('c_status'),
    start, end:val('c_end'), duration:val('c_duration').trim(),
    probation:val('c_prob'), probEnd:val('c_probend'), renew:val('c_renew'),
    notes:val('c_notes').trim(), file:val('c_file'), fileName:window._contractFileName||'',
    created:new Date().toISOString()
  });
  logChange(e,'إضافة عقد','رقم '+(no||'—'));
  saveDB(); toast('✓ تم حفظ العقد وإضافته للسجل','success'); renderEmpRows(); refreshAlerts(); openContracts(key);
}
function delContract(key, idx){
  const e=getEmp(key); if(!e||!e.contracts) return;
  if(!confirm('حذف هذا العقد من السجل؟')) return;
  e.contracts.splice(idx,1); logChange(e,'حذف عقد'); saveDB(); toast('🗑️ تم حذف العقد','success'); renderEmpRows(); refreshAlerts(); openContracts(key);
}

function saveSalary(key){
  if(!can('editSalary')) return toast('لا صلاحية لتعديل الرواتب','error');
  const e=getEmp(key); if(!e) return;
  const g=id=>{ const v=parseFloat(val(id)); return isNaN(v)?0:v; };
  const totalAllow=g('s_housing')+g('s_transport')+g('s_phone')+g('s_mgmt')+g('s_nature')+g('s_other');
  const total=g('s_basic')+totalAllow;
  const reason=val('s_reason').trim(), user=val('s_user').trim();
  const prev=e.salary?e.salary.total:null;
  e.salaryHistory=e.salaryHistory||[];
  const changed=(prev===null)||(prev!==total);
  if(changed){ e.salaryHistory.unshift({ prev: prev===null?0:prev, new: total, date:(val('s_eff')||today().iso), reason: reason||(prev===null?'إدخال أولي':'—'), user: user||'—' }); }
  e.salary={ basic:g('s_basic'), housing:g('s_housing'), transport:g('s_transport'), phone:g('s_phone'), mgmt:g('s_mgmt'), nature:g('s_nature'), other:g('s_other'), totalAllow:totalAllow, total:total, payMethod:val('s_pay'), bank:val('s_bank').trim(), iban:val('s_iban').trim(), effectiveDate:val('s_eff'), updated:new Date().toISOString() };
  logChange(e,'تعديل الراتب','إجمالي '+total+' د.أ'+(reason?(' — '+reason):''));
  if(user) DB.lastUser=user;
  saveDB(); toast(changed?'✓ تم حفظ الراتب وتسجيله في السجل التاريخي':'✓ تم حفظ بيانات الراتب','success'); renderEmpRows(); openSalary(key);
}

function addSSDoc(key, inp){ const e=getEmp(key); if(!e) return; e.ssDocs=e.ssDocs||[]; const files=[...inp.files]; let done=0; files.forEach(f=>{ if(f.size>3*1024*1024){ toast('تجاوز 3 ميغابايت: '+f.name,'error'); done++; return; } const rd=new FileReader(); rd.onload=()=>{ e.ssDocs.push({name:f.name,size:f.size,data:rd.result,added:new Date().toISOString()}); done++; if(done===files.length){ logChange(e,'إرفاق وثيقة ضمان'); saveDB(); toast('✓ تم إرفاق الوثائق','success'); openSocial(key); } }; rd.readAsDataURL(f); }); }

/* ==================== سجل التغييرات ==================== */
function logChange(e, action, detail){
  if(!e) return;
  const ts=new Date().toISOString(), user=DB.lastUser||'—';
  e.changeLog=e.changeLog||[];
  e.changeLog.unshift({ ts:ts, action:action||'', detail:detail||'', user:user });
  if(e.changeLog.length>300) e.changeLog.length=300;
  DB.auditLog=DB.auditLog||[];
  DB.auditLog.unshift({ ts:ts, user:user, action:action||'', empKey:e.nationalId, empName:e.fullNameAr||e.empNo||'', detail:detail||'' });
  if(DB.auditLog.length>3000) DB.auditLog.length=3000;
}

/* ==================== لوحة مؤشرات الموظفين (KPI) ==================== */
function inProbation(e){ return (e.contracts||[]).some(c=> c.status==='قيد التجربة' || (c.probEnd && daysLeft(c.probEnd)!==null && daysLeft(c.probEnd)>=0)); }
function kpiCards(){
  const emps=DB.employees.filter(e=>!e.archived);
  const total=emps.length;
  const active=emps.filter(e=>e.status==='على رأس عمله').length;
  const prob=emps.filter(inProbation).length;
  const onLeave=emps.filter(e=>e.status==='إجازة').length;
  const ended=emps.filter(e=>e.status==='مستقيل'||e.status==='منتهي الخدمة').length;
  const cts=expiringList().length;
  const dcs=expiringDocs().length;
  const card=(icon,label,val,color,onclick)=>'<div class="kpi"'+(onclick?' style="cursor:pointer" onclick="'+onclick+'"':'')+'><div class="kpi-ic" style="background:'+color+'1f;color:'+color+'">'+icon+'</div><div><div class="kpi-val" style="color:'+color+'">'+val+'</div><div class="kpi-lb">'+label+'</div></div></div>';
  return '<div class="kpi-grid">'+
    card('👥','إجمالي الموظفين',total,'#0E4A73','clearFilters()')+
    card('✅','على رأس العمل',active,'#1a8a5a','kpiFilter(\'على رأس عمله\')')+
    card('🧪','في فترة التجربة',prob,'#c47a1d','')+
    card('🌴','في إجازة',onLeave,'#2E8BC4','kpiFilter(\'إجازة\')')+
    card('📤','مستقيل/منتهي الخدمة',ended,'#a83232','kpiFilter(\'منتهي الخدمة\')')+
    card('📄','عقود تنتهي قريباً',cts,'#c47a1d','showAlerts()')+
    card('📎','وثائق تنتهي قريباً',dcs,'#8a6d0b','showAlerts()')+
  '</div>';
}
function kpiFilter(st){ showFilters=true; empFilter.status=st; renderEmployees(); }

let auditSearch='';
function renderAudit(){
  $('view').innerHTML='<div class="card"><div class="card-h"><h2>🧾 سجل التدقيق (Audit Log)</h2>'+
    '<div class="toolbar"><button class="btn btn-ghost btn-sm" onclick="exportAudit()">📊 تصدير</button><button class="btn btn-ghost btn-sm" onclick="clearAudit()">🗑️ مسح السجل</button></div></div>'+

    '<div id="auditWrap"></div></div>';

}
function auditSetSearch(v){ auditSearch=v; renderAuditRows(); }
function renderAuditRows(){
  const wrap=$('auditWrap'); if(!wrap) return; const all=DB.auditLog||[];

function exportAudit(){
  const all=DB.auditLog||[]; if(!all.length) return toast('لا يوجد بيانات للتصدير','error');
  const head=['التاريخ والوقت','المستخدم','نوع العملية','الموظف المعني','البيانات/التفاصيل'];
  const q=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  const lines=[head.map(q).join(',')];
  all.forEach(x=>lines.push([new Date(x.ts).toLocaleString('en-GB'),x.user,x.action,x.empName,x.detail].map(q).join(',')));
  const blob=new Blob(['﻿'+lines.join('\r\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='audit_log_'+today().iso+'.csv'; a.click();

}
function clearAudit(){ if(!confirm('مسح كامل سجل التدقيق؟ لا يمكن التراجع.')) return; DB.auditLog=[]; saveDB(); renderAudit(); toast('تم مسح سجل التدقيق','success'); }

const PERMS=[['viewEmployees','عرض الموظفين'],['addEmp','إضافة موظف'],['editEmp','تعديل موظف'],['delEmp','حذف موظف'],['viewSalary','عرض الرواتب'],['editSalary','تعديل الرواتب'],['viewDocs','عرض الوثائق'],['uploadDocs','رفع الوثائق'],['delDocs','حذف الوثائق'],['viewContracts','عرض العقود'],['editContracts','تعديل العقود'],['export','تصدير البيانات'],['reopenPayroll','إعادة فتح مسير رواتب مقفل']];

      '<div><label>اسم المستخدم (يُسجَّل في التدقيق)</label><input value="'+esc(DB.lastUser||'')+'" oninput="DB.lastUser=this.value" placeholder="اسم المستخدم"></div>'+

function togglePerm(role, perm, val){ DB.roles[role]=DB.roles[role]||{}; DB.roles[role][perm]=val?1:0; saveDB(); }
function addRole(){ const n=prompt('اسم الدور الجديد:'); if(!n) return; if(DB.roles[n]) return toast('الدور موجود','error'); DB.roles[n]=allPerms(false); DB.roles[n].viewEmployees=1; saveDB(); renderPerms(); toast('تم إضافة الدور','success'); }
function delRole(r){ if(Object.keys(DB.roles).length<=1) return toast('لا يمكن حذف آخر دور','error'); if(!confirm('حذف الدور: '+r+'؟')) return; delete DB.roles[r]; if(DB.currentRole===r) DB.currentRole=Object.keys(DB.roles)[0]; saveDB(); renderPerms(); }

/* ==================== مركز التقارير والتصدير ==================== */
function printTable(title, headers, rows, note){
  const th=headers.map(h=>'<th>'+esc(h)+'</th>').join('');
  const tr=rows.map(r=>'<tr>'+r.map(c=>'<td>'+esc(c==null?'':c)+'</td>').join('')+'</tr>').join('');
  const html='<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="utf-8"><title>'+esc(title)+'</title><style>'+
    'body{font-family:Tahoma,Arial;margin:22px;color:#16242F}h1{color:#0E4A73;border-bottom:3px solid #4FA8DC;padding-bottom:8px;text-align:center;font-size:18px}'+
    '.note{color:#555;font-size:12px;margin:6px 0}table{width:100%;border-collapse:collapse;font-size:12px}th,td{border:1px solid #cfe0ec;padding:6px 8px;text-align:right}th{background:#e8f4fd;color:#0E4A73}tbody tr:nth-child(even){background:#f5fafd}'+
    '.ft{margin-top:10px;font-size:10px;color:#888;text-align:center}@media print{body{margin:0}}</style></head><body>'+
    '<h1>'+esc(title)+'</h1>'+(note?'<div class="note">'+esc(note)+'</div>':'')+
    '<table><thead><tr>'+th+'</tr></thead><tbody>'+tr+'</tbody></table>'+
    '<div class="ft">عدد السجلات: '+rows.length+' · '+new Date().toLocaleString('en-GB')+' · يمكن الحفظ كـ PDF من نافذة الطباعة</div></body></html>';
  const w=window.open('','_blank','width=1000,height=720'); if(!w){ toast('اسمح بالنوافذ المنبثقة','error'); return; }
  w.document.write(html); w.document.close(); setTimeout(()=>w.print(),400);
}
function csvDL(name, headers, rows){
  const q=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  const lines=[headers.map(q).join(',')].concat(rows.map(r=>r.map(q).join(',')));
  const blob=new Blob(['﻿'+lines.join('\r\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name+'_'+today().iso+'.csv'; a.click();
  toast('✓ تم التصدير','success');
}

/* ==================== بنية بيانات منظّمة + ترحيل آمن ==================== */
/* ملاحظة: التخزين الفعلي يبقى كائن DB واحد في localStorage (مصدر الحقيقة)،
   وتُشتق منه «الجداول» المنظّمة عند التصدير. الترحيل يضيف المعرّفات الناقصة فقط
   ولا يعيد تهيئة أي بيانات موجودة. */
function migrateDB(){
  var changed=false;
  DB.schemaVersion = DB.schemaVersion || 0;
  DB.nextEid = DB.nextEid || 1;
  (DB.employees||[]).forEach(function(e){
    if(!e.empId){ e.empId='EID-'+String(DB.nextEid++).padStart(5,'0'); changed=true; }
    // ضمان وجود الهياكل الفرعية دون المساس بالموجود
    if(!Array.isArray(e.contracts)){ e.contracts=e.contracts||[]; changed=true; }
    if(!Array.isArray(e.documents)){ e.documents=e.documents||[]; changed=true; }
    if(!Array.isArray(e.salaryHistory)){ e.salaryHistory=e.salaryHistory||[]; changed=true; }
    if(!Array.isArray(e.ssDocs)){ e.ssDocs=e.ssDocs||[]; changed=true; }
    if(!Array.isArray(e.changeLog)){ e.changeLog=e.changeLog||[]; changed=true; }
  });
  if(!DB.leaveTypes){ DB.leaveTypes=[{name:'سنوية',quota:14},{name:'مرضية',quota:14},{name:'أمومة',quota:70},{name:'بدون راتب',quota:0},{name:'طارئة',quota:5},{name:'حج',quota:14}]; changed=true; }
  DB.nextLeaveNo = DB.nextLeaveNo || 1;
  if(DB.schemaVersion < 1){ DB.schemaVersion=1; changed=true; }
  if(changed) saveDB();
}
function newEid(){ DB.nextEid=(DB.nextEid||1); var id='EID-'+String(DB.nextEid++).padStart(5,'0'); return id; }

/* اشتقاق الجداول المنظّمة (كلها مرتبطة بـ EmployeeID) */
function normalizedDB(){
  var Employees=[],EmployeeContracts=[],EmployeeSalaries=[],EmployeeAllowances=[],EmployeeDocuments=[],EmployeeSocialSecurity=[],EmployeeAuditLog=[];
  (DB.employees||[]).forEach(function(e){
    var id=e.empId||e.nationalId;
    Employees.push({ EmployeeID:id, empNo:e.empNo, nationalId:e.nationalId, fullNameAr:e.fullNameAr, fullNameEn:e.fullNameEn,
      nationality:e.nationality, gender:e.gender, birthDate:e.birthDate, maritalStatus:e.maritalStatus, phone:e.phone, whatsapp:e.whatsapp,
      email:e.email, city:e.city, address:e.address, jobTitle:e.jobTitle, dept:e.dept, branch:e.branch, manager:e.manager,
      workLocation:e.workLocation, hireDate:e.hireDate, startDate:e.startDate, workType:e.workType, status:e.status,
      internalNo:e.internalNo, jobNo:e.jobNo, qualification:e.qualification, specialization:e.specialization, priorExperience:e.priorExperience, degree:e.degree, notes:e.notes, created:e.created, updated:e.updated });
    (e.contracts||[]).forEach(function(c,i){ EmployeeContracts.push({ EmployeeID:id, ContractID:c.id||(id+'-C'+(i+1)), contractNo:c.no, type:c.type, start:c.start, end:c.end, duration:c.duration, probation:c.probation, probEnd:c.probEnd, renewable:c.renew, status:c.status, notes:c.notes, hasFile:!!c.file }); });
    if(e.salary){ var s=e.salary;
      EmployeeSalaries.push({ EmployeeID:id, SalaryID:id+'-S-CUR', basic:s.basic, totalAllowances:s.totalAllow, totalSalary:s.total, payMethod:s.payMethod, bank:s.bank, iban:s.iban, effectiveDate:s.effectiveDate, isCurrent:true });
      ['housing','transport','phone','mgmt','nature','other'].forEach(function(k){
        var labels={housing:'بدل سكن',transport:'بدل مواصلات',phone:'بدل هاتف',mgmt:'بدل إدارة',nature:'بدل طبيعة عمل',other:'علاوات أخرى'};
        EmployeeAllowances.push({ EmployeeID:id, SalaryID:id+'-S-CUR', allowanceType:labels[k], amount:s[k]||0 });
      });
    }
    (e.salaryHistory||[]).forEach(function(h,i){ EmployeeSalaries.push({ EmployeeID:id, SalaryID:id+'-SH'+(i+1), prevTotal:h.prev, newTotal:h.new, date:h.date, reason:h.reason, changedBy:h.user, isCurrent:false }); });
    (e.documents||[]).forEach(function(d,i){ EmployeeDocuments.push({ EmployeeID:id, DocumentID:d.id||(id+'-D'+(i+1)), type:d.type, name:d.name, number:d.number, issueDate:d.issueDate, expiryDate:d.expiryDate, issuer:d.issuer, notes:d.notes, fileName:d.fileName||d.name, hasFile:!!(d.fileData||d.data) }); });
    if(e.social){ var so=e.social; EmployeeSocialSecurity.push({ EmployeeID:id, isCovered:so.covered, ssNumber:so.no, subscribeDate:so.date, subjectSalary:so.salary, status:so.status, notes:so.notes, docsCount:(e.ssDocs||[]).length }); }
    (e.changeLog||[]).forEach(function(x){ EmployeeAuditLog.push({ EmployeeID:id, username:x.user, actionType:x.action, changedData:x.detail, dateTime:x.ts }); });
  });
  return { meta:{ schemaVersion:DB.schemaVersion||1, generatedAt:new Date().toISOString(), employeesCount:Employees.length },
    Employees:Employees, EmployeeContracts:EmployeeContracts, EmployeeSalaries:EmployeeSalaries, EmployeeAllowances:EmployeeAllowances,
    EmployeeDocuments:EmployeeDocuments, EmployeeSocialSecurity:EmployeeSocialSecurity, EmployeeAuditLog:EmployeeAuditLog };
}
function exportNormalized(){
  if(!can('export')) return toast('لا صلاحية للتصدير','error');
  var data=normalizedDB();
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='employees_normalized_'+today().iso+'.json'; a.click();
  toast('✓ تم تصدير بنية البيانات المنظّمة ('+data.Employees.length+' موظف)','success');
}

/* ==================== شاشة تسجيل الدوام ==================== */
/* نظام حضور وانصراف متكامل — مرتبط بملف الموظف الموحّد (EmployeeID) */
var attNid = '', attMonth = '';
var ATT_STATUSES = ['حاضر','غائب','إجازة','عطلة رسمية','مهمة عمل','عمل عن بُعد','إجازة مرضية'];
var ATT_PRESENT = ['حاضر','عمل عن بُعد','مهمة عمل'];
var ATT_DAYTYPES = ['يوم عمل','نهاية أسبوع','عطلة رسمية'];
function attToMin(t){ if(!t) return 0; var p=t.split(':'); return (parseInt(p[0],10)||0)*60+(parseInt(p[1],10)||0); }
function r2(n){ return Math.round((n||0)*100)/100; }
function attSettings(){ DB.attSettings = DB.attSettings || {shiftStart:'08:00', shiftEnd:'16:00', requiredHours:8, graceMin:15}; return DB.attSettings; }
/* الحساب التلقائي لسجل واحد */
function attCalc(status, checkIn, checkOut, requiredHours){
  var S=attSettings(); var actual=0, late=0, early=0, ot=0;
  var req = (requiredHours!=null && requiredHours!=='') ? parseFloat(requiredHours) : S.requiredHours;
  if(ATT_PRESENT.indexOf(status)!==-1 && checkIn && checkOut){
    actual = Math.max(0, (attToMin(checkOut)-attToMin(checkIn)))/60;
    late   = Math.max(0, attToMin(checkIn) - attToMin(S.shiftStart) - (S.graceMin||0));
    early  = Math.max(0, attToMin(S.shiftEnd) - attToMin(checkOut));
    ot     = Math.max(0, actual - req);
  }
  return { requiredHours:req, actualHours:r2(actual), lateMin:late, earlyLeaveMin:early, overtimeHours:r2(ot) };
}
/* توحيد سجل قديم/جديد للقراءة */
function attNorm(r){ return { date:r.date, status:r.status||'حاضر', checkIn:r.checkIn||r.from||'', checkOut:r.checkOut||r.to||'', requiredHours:r.requiredHours, actualHours:(r.actualHours!=null?r.actualHours:r.hours), lateMin:r.lateMin||0, earlyLeaveMin:r.earlyLeaveMin||0, overtimeHours:r.overtimeHours||0, dayType:r.dayType||'يوم عمل', notes:r.notes||'' }; }

function attEntryCard(e){

      '<div class="att-metric"><span>خروج مبكر (دقيقة)</span><b id="m_early">0</b></div>'+
      '<div class="att-metric"><span>ساعات إضافية</span><b id="m_ot">0</b></div>'+
    '</div>'+
    '<button class="btn btn-primary" style="margin-top:12px" onclick="attSave()">💾 حفظ يوم الدوام</button>'+
  '</div>';
}
function attSelect(){ var nid=val('att_nid').trim(); var e=nid?getEmp(nid):null; if(nid && !e){ toast('لا يوجد موظف بهذا الرقم الوطني','error'); return; } attNid=nid; renderAttendance(); }
function attCompute(){
  var c=attCalc(val('e_status'), val('e_in'), val('e_out'), val('e_req'));
  if($('m_actual')) $('m_actual').textContent=c.actualHours;
  if($('m_late')) $('m_late').textContent=c.lateMin;
  if($('m_early')) $('m_early').textContent=c.earlyLeaveMin;
  if($('m_ot')) $('m_ot').textContent=c.overtimeHours;
}
function attLoadDay(){
  var d=val('e_date'); var rec=(DB.attendance||[]).find(function(r){ return r.nationalId===attNid && r.date===d; });
  if(rec){ var n=attNorm(rec); $('e_status').value=n.status; $('e_daytype').value=n.dayType; $('e_req').value=(n.requiredHours!=null?n.requiredHours:attSettings().requiredHours); $('e_in').value=n.checkIn; $('e_out').value=n.checkOut; $('e_notes').value=n.notes; }
  else { var S=attSettings(); $('e_status').value='حاضر'; $('e_daytype').value='يوم عمل'; $('e_req').value=S.requiredHours; $('e_in').value=S.shiftStart; $('e_out').value=S.shiftEnd; $('e_notes').value=''; }
  attCompute();
}
function attSave(){
  if(!can('editEmp')) return toast('لا صلاحية لتعديل الدوام','error');
  if(!attNid) return toast('اختر موظفاً أولاً','error');
  var e=getEmp(attNid); if(!e) return toast('الموظف غير مسجّل في الملف الموحّد','error');
  var d=val('e_date'); if(!d) return toast('حدّد تاريخ الدوام','error');
  var status=val('e_status'); var c=attCalc(status, val('e_in'), val('e_out'), val('e_req'));
  var rec={ nationalId:attNid, empId:e.empId, date:d, status:status, checkIn:val('e_in'), checkOut:val('e_out'),
    requiredHours:c.requiredHours, actualHours:c.actualHours, lateMin:c.lateMin, earlyLeaveMin:c.earlyLeaveMin,
    overtimeHours:c.overtimeHours, dayType:val('e_daytype'), notes:val('e_notes').trim(), updated:new Date().toISOString() };
  DB.attendance=DB.attendance||[];
  var idx=DB.attendance.findIndex(function(r){ return r.nationalId===attNid && r.date===d; });
  if(idx>=0){ rec.created=DB.attendance[idx].created||rec.updated; DB.attendance[idx]=rec; }
  else { rec.created=rec.updated; DB.attendance.unshift(rec); }
  logChange(e,'تسجيل/تعديل دوام', d+' — '+status);
  saveDB(); toast('✓ تم حفظ يوم الدوام ('+status+')','success'); attRenderSummary(); attRenderRecords();
}
function attDel(date){
  if(!can('editEmp')) return toast('لا صلاحية','error');
  if(!confirm('حذف سجل دوام يوم '+date+'؟')) return;
  DB.attendance=(DB.attendance||[]).filter(function(r){ return !(r.nationalId===attNid && r.date===date); });
  saveDB(); toast('🗑️ تم الحذف','success'); attRenderSummary(); attRenderRecords();
}
function attMonthRecords(){ return (DB.attendance||[]).filter(function(r){ return r.nationalId===attNid && (r.date||'').indexOf(attMonth)===0; }).map(attNorm).sort(function(a,b){ return (a.date<b.date?1:-1); }); }
function attRenderSummary(){
  var box=$('attSummary'); if(!box) return;
  var recs=attMonthRecords();
  var totalWork=recs.filter(function(r){ return r.status!=='عطلة رسمية'; }).length;
  var present=recs.filter(function(r){ return ATT_PRESENT.indexOf(r.status)!==-1; }).length;
  var absent=recs.filter(function(r){ return r.status==='غائب'; }).length;
  var leaves=recs.filter(function(r){ return r.status==='إجازة'||r.status==='إجازة مرضية'; }).length;
  var totalLate=r2(recs.reduce(function(s,r){ return s+(r.lateMin||0); },0)/60);
  var totalOT=r2(recs.reduce(function(s,r){ return s+(r.overtimeHours||0); },0));
  var comp = (present+absent)>0 ? Math.round(present/(present+absent)*100) : 100;
  var card=function(ic,lb,v,color){ return '<div class="kpi"><div class="kpi-ic" style="background:'+color+'1f;color:'+color+'">'+ic+'</div><div><div class="kpi-val" style="color:'+color+'">'+v+'</div><div class="kpi-lb">'+lb+'</div></div></div>'; };
  box.innerHTML='<div class="kpi-grid">'+
    card('📆','إجمالي أيام العمل',totalWork,'#0E4A73')+
    card('✅','أيام الحضور',present,'#1a8a5a')+
    card('❌','أيام الغياب',absent,'#a83232')+
    card('🌴','إجازات',leaves,'#2E8BC4')+
    card('⏰','مجموع ساعات التأخير',totalLate,'#c47a1d')+
    card('➕','مجموع الساعات الإضافية',totalOT,'#1E6FA8')+
    card('📊','نسبة الالتزام بالدوام',comp+'%', comp>=90?'#1a8a5a':comp>=75?'#c47a1d':'#a83232')+
  '</div>';
}

    '<td>'+esc(r.dayType||'—')+'</td><td>'+esc(r.notes||'—')+'</td>'+
    '<td style="white-space:nowrap">'+(can('editEmp')?'<button class="icon-btn danger" title="حذف" onclick="attDel(\''+esc(r.date)+'\')">🗑️</button>':'')+'</td></tr>'; }).join('');
  box.innerHTML='<div class="tblwrap"><table><thead><tr><th>التاريخ</th><th>الحالة</th><th>الحضور</th><th>الانصراف</th><th>مطلوبة</th><th>فعلية</th><th>التأخير</th><th>خروج مبكر</th><th>إضافي</th><th>نوع اليوم</th><th>ملاحظات</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}
function attSettingsModal(){
  var S=attSettings();
  modal('⚙️ إعدادات الدوام', '<div class="grid g2">'+
    '<div><label>بداية الدوام</label><input id="st_start" type="time" value="'+esc(S.shiftStart)+'"></div>'+
    '<div><label>نهاية الدوام</label><input id="st_end" type="time" value="'+esc(S.shiftEnd)+'"></div>'+

function attImportCSV(inp){
  if(!can('editEmp')) return toast('لا صلاحية','error');
  var f=inp.files[0]; if(!f) return; var rd=new FileReader();
  rd.onload=function(){ try{
    var lines=String(rd.result).split(/\r?\n/).filter(function(l){ return l.trim(); }); if(lines.length<2){ toast('الملف فارغ','error'); return; }
    var added=0, skipped=0;
    lines.slice(1).forEach(function(ln){
      var c=ln.split(',').map(function(x){ return x.replace(/^"|"$/g,'').trim(); });
      var nid=c[0], date=c[1], status=c[2]||'حاضر', cin=c[3]||'', cout=c[4]||'';
      var e=getEmp(nid); if(!e || !date){ skipped++; return; }
      var calc=attCalc(status,cin,cout,null);
      var rec={ nationalId:nid, empId:e.empId, date:date, status:status, checkIn:cin, checkOut:cout, requiredHours:calc.requiredHours, actualHours:calc.actualHours, lateMin:calc.lateMin, earlyLeaveMin:calc.earlyLeaveMin, overtimeHours:calc.overtimeHours, dayType:'يوم عمل', notes:'مستورد', created:new Date().toISOString() };
      DB.attendance=DB.attendance||[]; var idx=DB.attendance.findIndex(function(r){ return r.nationalId===nid && r.date===date; });
      if(idx>=0) DB.attendance[idx]=rec; else DB.attendance.unshift(rec); added++;
    });
    saveDB(); closeModal(); toast('✓ تم استيراد '+added+' سجل'+(skipped?(' (تجاهل '+skipped+')'):''),'success'); renderAttendance();
  }catch(e){ toast('تعذّر قراءة الملف','error'); } inp.value=''; };
  rd.readAsText(f);
}

var LEAVE_STAGES = ['المدير المباشر','الموارد البشرية','الاعتماد النهائي'];
var LEAVE_STATUSES = ['قيد المراجعة','موافق عليه','مرفوض','ملغي'];
var lvFilter = '';
function leaveTypesList(){ DB.leaveTypes = DB.leaveTypes || [{name:'سنوية',quota:14},{name:'مرضية',quota:14},{name:'أمومة',quota:70},{name:'بدون راتب',quota:0},{name:'طارئة',quota:5},{name:'حج',quota:14}]; return DB.leaveTypes; }
function newLeaveNo(){ DB.nextLeaveNo=(DB.nextLeaveNo||1); return 'LV-'+String(DB.nextLeaveNo++).padStart(4,'0'); }
function leaveYear(){ return new Date().getFullYear(); }
function leaveDaysCount(a,b){ if(!a||!b) return 0; var d=Math.floor((new Date(b)-new Date(a))/86400000)+1; return d>0?d:0; }
function leaveQuota(type){ var t=leaveTypesList().find(function(x){ return x.name===type; }); return t?(t.quota||0):0; }
function leaveUsed(nid,type,exclId){ return (DB.leaves||[]).filter(function(r){ return r.nationalId===nid && r.type===type && r.status==='موافق عليه' && r.id!==exclId && String(r.startDate||'').slice(0,4)==String(leaveYear()); }).reduce(function(s,r){ return s+(r.days||0); },0); }
function leaveBalance(nid,type,exclId){ return leaveQuota(type) - leaveUsed(nid,type,exclId); }

/* ---------- عرض الطلب + دورة الاعتماد ---------- */
function leaveStepper(r){
  var curIdx = r.status==='موافق عليه' ? LEAVE_STAGES.length : (r.status==='قيد المراجعة' ? LEAVE_STAGES.indexOf(r.stage) : -2);
  var steps=['تقديم الموظف'].concat(LEAVE_STAGES).concat(['مكتمل']);
  return '<div class="lv-steps">'+steps.map(function(st,i){
    var done, cls;
    if(r.status==='مرفوض'||r.status==='ملغي'){ cls=i===0?'done':'off'; }
    else { var doneCount = 1 + (r.status==='موافق عليه'?LEAVE_STAGES.length+1:LEAVE_STAGES.indexOf(r.stage)); cls = i<doneCount?'done': (i===doneCount?'cur':'off'); }
    return '<div class="lv-step '+cls+'"><div class="lv-dot">'+(cls==='done'?'✓':(i+1))+'</div><div class="lv-lb">'+esc(st)+'</div></div>';
  }).join('<div class="lv-line"></div>')+'</div>';

    acts='<button class="btn btn-primary" onclick="leaveApprove(\''+r.id+'\')">✔️ اعتماد المرحلة ('+esc(r.stage)+')</button>'+

    '</div>'+

      (hist?'<div class="tblwrap"><table><thead><tr><th>المرحلة</th><th>الإجراء</th><th>المستخدم</th><th>التاريخ</th><th>ملاحظة</th></tr></thead><tbody>'+hist+'</tbody></table></div>':'<div class="hint">لا يوجد سجل</div>')+
    '</div>',
    '<button class="btn btn-ghost" onclick="closeModal()">إغلاق</button>'+acts);
}
function leaveApprove(id){
  var r=(DB.leaves||[]).find(function(x){ return x.id===id; }); if(!r||r.status!=='قيد المراجعة') return;

  else { r.status='موافق عليه'; r.stage='مكتمل'; r.balanceAfter=leaveBalance(r.nationalId,r.type,r.id)-r.days; }
  logChange(getEmp(r.nationalId),'اعتماد إجازة', r.id+' — '+(r.status==='موافق عليه'?'اعتماد نهائي':('مرحلة '+r.stage)));

function leaveReject(id){

/* ==================== الرواتب ومسيرات الرواتب (Payroll) ==================== */
function pad2(n){ return (n<10?'0':'')+n; }
function payrollSettings(){ DB.payrollSettings = DB.payrollSettings || { taxEnabled:true, singleExemption:9000, familyExemption:18000, extraRelief:0, ssEmployeeRate:7.5, otMultiplier:1.25, workDays:30, brackets:[{upTo:5000,rate:5},{upTo:10000,rate:10},{upTo:15000,rate:15},{upTo:20000,rate:20},{upTo:1000000,rate:25},{upTo:null,rate:30}] }; return DB.payrollSettings; }
/* ضريبة الدخل الأردنية — شرائح تصاعدية على الدخل السنوي الخاضع بعد الإعفاء */
function calcTaxAnnual(income){ var P=payrollSettings(); var tax=0, prev=0; for(var i=0;i<P.brackets.length;i++){ var b=P.brackets[i]; var cap=(b.upTo==null)?Infinity:b.upTo; var slice=Math.max(0, Math.min(income,cap)-prev); tax+=slice*(b.rate/100); prev=cap; if(income<=cap) break; } return tax; }
function attMonthAgg(nid, ym){ var recs=(DB.attendance||[]).filter(function(r){ return r.nationalId===nid && String(r.date||'').indexOf(ym)===0; }).map(attNorm); return { overtime:recs.reduce(function(s,r){ return s+(r.overtimeHours||0); },0), lateHours:recs.reduce(function(s,r){ return s+((r.lateMin||0)/60); },0), absentDays:recs.filter(function(r){ return r.status==='غائب'; }).length }; }
function unpaidLeaveDaysMonth(nid, ym){ return (DB.leaves||[]).filter(function(r){ return r.nationalId===nid && r.type==='بدون راتب' && r.status==='موافق عليه' && String(r.startDate||'').indexOf(ym)===0; }).reduce(function(s,r){ return s+(r.days||0); },0); }
function computeLine(e, ym, m){
  m=m||{}; var P=payrollSettings(); var s=e.salary||{};
  var basic=parseFloat(s.basic)||0, allow=parseFloat(s.totalAllow)||0;
  var Att=attMonthAgg(e.nationalId, ym);
  var reqH=(attSettings().requiredHours||8); var dailyRate=(basic+allow)/(P.workDays||30); var hourlyRate=dailyRate/reqH;
  var overtimePay=r2(Att.overtime*hourlyRate*(P.otMultiplier||1));
  var absDays=Att.absentDays + unpaidLeaveDaysMonth(e.nationalId, ym);
  var absenceDeduct=r2(absDays*dailyRate);
  var lateDeduct=r2(Att.lateHours*hourlyRate);
  var ssCovered=!!(e.social && (e.social.covered==='نعم' || e.social.covered===true || e.social.covered===1 || e.social.covered==='1'));
  var socialSecurity= ssCovered ? r2((basic+allow)*(P.ssEmployeeRate||0)/100) : 0;
  var bonus=parseFloat(m.bonus)||0, commission=parseFloat(m.commission)||0, otherAdd=parseFloat(m.otherAdd)||0;
  var advance=parseFloat(m.advance)||0, otherDeduct=parseFloat(m.otherDeduct)||0;
  var loan=(m.loan!==undefined && m.loan!==null && m.loan!=='')?(parseFloat(m.loan)||0):(typeof loanMonthlyDue==='function'?loanMonthlyDue(e.nationalId, ym):0);
  var marital=m.marital||((e.maritalStatus==='متزوج')?'متزوج':'أعزب');
  var incomeTax=0;
  if(P.taxEnabled){
    var monthlyTaxable=basic+allow+bonus+commission+otherAdd+overtimePay;
    var exemption=(marital==='متزوج'?P.familyExemption:P.singleExemption)+(P.extraRelief||0);
    var annualTaxable=Math.max(0, (monthlyTaxable-socialSecurity)*12 - exemption);
    incomeTax=r2(calcTaxAnnual(annualTaxable)/12);
  }
  var totalEarnings=r2(basic+allow+overtimePay+bonus+commission+otherAdd);
  var totalDeductions=r2(absenceDeduct+lateDeduct+socialSecurity+incomeTax+advance+loan+otherDeduct);
  return { empId:e.empId, nationalId:e.nationalId, name:e.fullNameAr, marital:marital, basic:basic, allowances:allow, overtime:overtimePay,
    bonus:bonus, commission:commission, otherAdd:otherAdd, absenceDeduct:absenceDeduct, lateDeduct:lateDeduct, socialSecurity:socialSecurity, incomeTax:incomeTax,
    advance:advance, loan:loan, otherDeduct:otherDeduct, totalEarnings:totalEarnings, totalDeductions:totalDeductions, net:r2(totalEarnings-totalDeductions) };
}

function renderPayroll(){
  if(!can('viewSalary')){ $('view').innerHTML='<div class="card"><div class="empty">لا صلاحية لعرض الرواتب</div></div>'; return; }
  var runs=(DB.payrolls||[]).slice().sort(function(a,b){ return (b.year*100+b.month)-(a.year*100+a.month); });
  var rows=runs.map(function(r){
    var net=(r.lines||[]).reduce(function(s,l){ return s+(l.net||0); },0);
    var stB= r.status==='مقفل'?'red': r.status==='معتمد'?'green':'gray';
    return '<tr><td class="num" dir="ltr"><b>'+esc(r.id)+'</b></td><td>'+esc(r.month+' / '+r.year)+'</td><td>'+(r.lines||[]).length+'</td><td class="num">'+money(r2(net))+'</td><td><span class="badge '+stB+'">'+esc(r.status)+'</span></td>'+
      '<td style="white-space:nowrap"><button class="icon-btn" title="فتح" onclick="openPayroll(\''+esc(r.id)+'\')">👁️</button>'+
      (can('editSalary') && r.status==='مسودة'?' <button class="icon-btn danger" title="حذف" onclick="delPayroll(\''+esc(r.id)+'\')">🗑️</button>':'')+'</td></tr>';
  }).join('');
  $('view').innerHTML='<div class="card"><div class="card-h"><h2>💵 الرواتب ومسيرات الرواتب</h2>'+
    '<div class="toolbar">'+(can('editSalary')?'<button class="btn btn-gold btn-sm" onclick="createPayrollModal()">+ إنشاء مسير شهري</button>':'')+
      '<button class="btn btn-ghost btn-sm" onclick="payrollSettingsModal()">⚙️ إعدادات الرواتب والضريبة</button></div></div>'+
    (runs.length? '<div class="tblwrap"><table><thead><tr><th>رقم المسير</th><th>الشهر/السنة</th><th>عدد الموظفين</th><th>إجمالي الصافي</th><th>الحالة</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>'
      : '<div class="empty"><div class="empty-icon">💵</div><div>لا توجد مسيرات رواتب — أنشئ مسيراً شهرياً</div></div>')+
  '</div>';
}

  '</div><div class="hint" style="margin-top:8px">يُنشأ المسير تلقائياً لكل الموظفين الفعّالين ممن لديهم بيانات راتب، ويحتسب البدلات والإضافي والغياب والتأخير والضمان والضريبة تلقائياً.</div>',
    '<button class="btn btn-ghost" onclick="closeModal()">إلغاء</button><button class="btn btn-primary" onclick="createPayroll()">⚙️ إنشاء واحتساب</button>');

function createPayroll(){
  if(!can('editSalary')) return toast('لا صلاحية','error');
  var month=parseInt(val('pr_month'),10), year=parseInt(val('pr_year'),10);
  var ym=year+'-'+pad2(month);
  if((DB.payrolls||[]).some(function(r){ return r.year===year && r.month===month; })){ if(!confirm('يوجد مسير لهذا الشهر مسبقاً. إنشاء نسخة أخرى؟')) return; }
  var emps=DB.employees.filter(function(e){ return !e.archived && e.salary; });
  if(!emps.length){ toast('لا يوجد موظفون لديهم بيانات راتب','error'); return; }
  var lines=emps.map(function(e){ return computeLine(e, ym, {marital:(e.maritalStatus==='متزوج')?'متزوج':'أعزب'}); });
  DB.nextPayrollNo=DB.nextPayrollNo||1;
  var run={ id:'PR-'+String(DB.nextPayrollNo++).padStart(4,'0'), year:year, month:month, status:'مسودة', createdBy:DB.lastUser||DB.currentRole||'—', createdAt:new Date().toISOString(), lines:lines };
  DB.payrolls=DB.payrolls||[]; DB.payrolls.unshift(run);
  DB.auditLog=DB.auditLog||[]; DB.auditLog.unshift({ ts:new Date().toISOString(), user:DB.lastUser||'—', action:'إنشاء مسير رواتب', empKey:'', empName:run.id, detail:'شهر '+month+'/'+year+' — '+lines.length+' موظف' });
  saveDB(); closeModal(); toast('✓ تم إنشاء المسير '+run.id+' ('+lines.length+' موظف)','success'); openPayroll(run.id);
}
function payrollGet(id){ return (DB.payrolls||[]).find(function(r){ return r.id===id; }); }
function payrollLocked(r){ return r.status==='مقفل'; }
function openPayroll(id){
  var r=payrollGet(id); if(!r) return; if(!can('viewSalary')) return toast('لا صلاحية','error');
  var tE=(r.lines||[]).reduce(function(s,l){ return s+(l.totalEarnings||0); },0);
  var tD=(r.lines||[]).reduce(function(s,l){ return s+(l.totalDeductions||0); },0);
  var tN=(r.lines||[]).reduce(function(s,l){ return s+(l.net||0); },0);
  var rows=(r.lines||[]).map(function(l,i){ return '<tr>'+
    '<td>'+(i+1)+'</td><td><b>'+esc(l.name||l.nationalId)+'</b></td><td class="num">'+money(l.basic)+'</td><td class="num">'+money(l.allowances)+'</td>'+
    '<td class="num">'+money(l.overtime)+'</td><td class="num">'+money(r2((l.bonus||0)+(l.commission||0)+(l.otherAdd||0)))+'</td>'+
    '<td class="num" style="color:#a83232">'+money(l.totalDeductions)+'</td><td class="num">'+money(l.incomeTax)+'</td>'+
    '<td class="num"><b style="color:var(--navy)">'+money(l.net)+'</b></td><td>'+esc(l.marital)+'</td>'+
    '<td style="white-space:nowrap"><button class="icon-btn" title="قسيمة راتب" onclick="printPayslip(\''+esc(r.id)+'\','+i+')">🧾</button>'+
      ((!payrollLocked(r)||can('reopenPayroll'))&&can('editSalary')?' <button class="icon-btn" title="تعديل" onclick="editPayLine(\''+esc(r.id)+'\','+i+')">✏️</button>':'')+'</td></tr>'; }).join('');
  var acts='';
  if(can('editSalary')){
    if(r.status==='مسودة') acts+='<button class="btn btn-primary" onclick="recomputePayroll(\''+r.id+'\')">🔄 إعادة الاحتساب</button><button class="btn btn-gold" onclick="setPayrollStatus(\''+r.id+'\',\'معتمد\')">✔️ اعتماد</button>';
    if(r.status==='معتمد') acts+='<button class="btn btn-danger" onclick="setPayrollStatus(\''+r.id+'\',\'مقفل\')">🔒 إقفال</button><button class="btn btn-ghost" onclick="setPayrollStatus(\''+r.id+'\',\'مسودة\')">↩ إعادة لمسودة</button>';
    if(r.status==='مقفل') acts+= (can('reopenPayroll')?'<button class="btn btn-gold" onclick="reopenPayroll(\''+r.id+'\')">🔓 إعادة فتح (صلاحية خاصة)</button>':'<span class="hint">🔒 مقفل — يتطلب صلاحية خاصة لإعادة الفتح</span>');
  }
  modal('💵 مسير رواتب '+esc(r.id)+' — '+r.month+'/'+r.year+'  ['+esc(r.status)+']',
    '<div class="grid g3" style="margin-bottom:10px">'+
      '<div class="att-metric"><span>إجمالي الاستحقاقات</span><b>'+money(r2(tE))+'</b></div>'+
      '<div class="att-metric"><span>إجمالي الاستقطاعات</span><b style="color:#a83232">'+money(r2(tD))+'</b></div>'+
      '<div class="att-metric"><span>صافي الرواتب</span><b style="color:var(--navy)">'+money(r2(tN))+'</b></div>'+
    '</div>'+
    '<div class="toolbar" style="margin-bottom:10px"><button class="btn btn-ghost btn-sm" onclick="printPayrollSheet(\''+r.id+'\')">🖨️ طباعة كشف الرواتب</button></div>'+
    '<div class="tblwrap"><table><thead><tr><th>#</th><th>الموظف</th><th>الأساسي</th><th>البدلات</th><th>الإضافي</th><th>إضافات</th><th>الاستقطاعات</th><th>ض.الدخل</th><th>الصافي</th><th>الحالة</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>',
    '<button class="btn btn-ghost" onclick="closeModal()">إغلاق</button>'+acts);
  var m=document.querySelector('.modal-bg .modal'); if(m) m.classList.add('wide');
}
function recomputePayroll(id){
  var r=payrollGet(id); if(!r||payrollLocked(r)) return;
  r.lines=(r.lines||[]).map(function(l){ var e=getEmp(l.nationalId); if(!e) return l; return computeLine(e, r.year+'-'+pad2(r.month), {bonus:l.bonus,commission:l.commission,otherAdd:l.otherAdd,advance:l.advance,loan:l.loan,otherDeduct:l.otherDeduct,marital:l.marital}); });
  saveDB(); toast('🔄 تم إعادة احتساب المسير','success'); openPayroll(id);
}
function setPayrollStatus(id, st){
  var r=payrollGet(id); if(!r) return; if(!can('editSalary')) return toast('لا صلاحية','error');
  if(payrollLocked(r) && !can('reopenPayroll')) return toast('المسير مقفل — يتطلب صلاحية خاصة','error');
  r.status=st; if(st==='معتمد') r.approvedBy=DB.lastUser||'—'; if(st==='مقفل') r.closedBy=DB.lastUser||'—';
  DB.auditLog=DB.auditLog||[]; DB.auditLog.unshift({ ts:new Date().toISOString(), user:DB.lastUser||'—', action:'تغيير حالة مسير الرواتب', empKey:'', empName:r.id, detail:'→ '+st });
  saveDB(); toast('✓ حالة المسير: '+st,'success'); openPayroll(id);
}
function reopenPayroll(id){
  if(!can('reopenPayroll')) return toast('لا صلاحية خاصة لإعادة فتح المسير المقفل','error');
  var r=payrollGet(id); if(!r) return;
  if(!confirm('إعادة فتح المسير المقفل '+id+'؟ ستُسجَّل العملية في سجل التدقيق.')) return;
  r.status='معتمد'; r.reopenedBy=DB.lastUser||'—'; r.reopenedAt=new Date().toISOString();
  DB.auditLog=DB.auditLog||[]; DB.auditLog.unshift({ ts:new Date().toISOString(), user:DB.lastUser||'—', action:'إعادة فتح مسير رواتب مقفل (صلاحية خاصة)', empKey:'', empName:r.id, detail:'أُعيد إلى: معتمد' });
  saveDB(); toast('🔓 تم إعادة فتح المسير','success'); openPayroll(id);
}
function delPayroll(id){ if(!can('editSalary')) return toast('لا صلاحية','error'); var r=payrollGet(id); if(!r) return; if(r.status!=='مسودة') return toast('لا يمكن حذف مسير معتمد/مقفل','error'); if(!confirm('حذف المسير '+id+'؟')) return; DB.payrolls=DB.payrolls.filter(function(x){ return x.id!==id; }); saveDB(); toast('🗑️ تم الحذف','success'); renderPayroll(); }

/* تعديل بند + زر الحالة الاجتماعية لاحتساب الضريبة */

      '<div class="att-metric"><span>الضمان</span><b id="pv_ss">'+money(l.socialSecurity)+'</b></div>'+

    '</div>',
    '<button class="btn btn-ghost" onclick="openPayroll(\''+id+'\')">إلغاء</button><button class="btn btn-primary" onclick="savePayLine(\''+id+'\','+idx+')">💾 حفظ البند</button>');
}
function editPayCalc(id, idx){
  var r=payrollGet(id); var l=r.lines[idx]; var e=getEmp(l.nationalId);
  return computeLine(e, r.year+'-'+pad2(r.month), { marital:val('pl_marital'), bonus:val('pl_bonus'), commission:val('pl_comm'), otherAdd:val('pl_oadd'), advance:val('pl_adv'), loan:val('pl_loan'), otherDeduct:val('pl_od') });
}
function editPayPreview(id, idx){
  var c=editPayCalc(id,idx);
  if($('pv_ot')) $('pv_ot').textContent=money(c.overtime);
  if($('pv_abs')) $('pv_abs').textContent=money(r2(c.absenceDeduct+c.lateDeduct));
  if($('pv_ss')) $('pv_ss').textContent=money(c.socialSecurity);
  if($('pv_tax')) $('pv_tax').textContent=money(c.incomeTax);
  if($('pv_te')) $('pv_te').textContent=money(c.totalEarnings);
  if($('pv_td')) $('pv_td').textContent=money(c.totalDeductions);
  if($('pv_net')) $('pv_net').textContent=money(c.net);
}
function savePayLine(id, idx){
  var r=payrollGet(id); if(payrollLocked(r) && !can('reopenPayroll')) return toast('المسير مقفل','error');
  var c=editPayCalc(id,idx); r.lines[idx]=c;
  DB.auditLog=DB.auditLog||[]; DB.auditLog.unshift({ ts:new Date().toISOString(), user:DB.lastUser||'—', action:'تعديل بند راتب'+(payrollLocked(r)?' (مسير مقفل - صلاحية خاصة)':''), empKey:c.nationalId, empName:c.name, detail:r.id+' — صافي '+c.net });
  saveDB(); toast('✓ تم حفظ البند','success'); openPayroll(id);
}

/* طباعة كشف الرواتب + قسيمة راتب */

  var r=payrollGet(id); var l=r.lines[idx]; if(!l) return; var s=DB.settings||{};
  var row=function(a,b){ return '<tr><td class="l">'+a+'</td><td class="num">'+money(b)+'</td></tr>'; };

/* ==================== لوحة تقارير الموارد البشرية ==================== */
var hrMonth='';
function empMonthAgg(nid, ym){
  var recs=(DB.attendance||[]).filter(function(r){ return r.nationalId===nid && String(r.date||'').indexOf(ym)===0; }).map(attNorm);
  var present=recs.filter(function(r){ return ATT_PRESENT.indexOf(r.status)!==-1; }).length;
  var absent=recs.filter(function(r){ return r.status==='غائب'; }).length;
  var lateH=r2(recs.reduce(function(s,r){ return s+((r.lateMin||0)/60); },0));
  var ot=r2(recs.reduce(function(s,r){ return s+(r.overtimeHours||0); },0));
  var comp=(present+absent)>0?Math.round(present/(present+absent)*100):100;
  return {days:recs.length, present:present, absent:absent, lateHours:lateH, overtime:ot, compliance:comp};
}
function hrAvgCompliance(ym){ var emps=DB.employees.filter(function(e){ return !e.archived; }); var tot=0,cnt=0; emps.forEach(function(e){ var a=empMonthAgg(e.nationalId,ym); if(a.present+a.absent>0){ tot+=a.compliance; cnt++; } }); return cnt?Math.round(tot/cnt):100; }
function renderHRDash(){
  if(!hrMonth) hrMonth=today().iso.slice(0,7);

  var lastRun=(DB.payrolls||[]).slice().sort(function(a,b){ return (b.year*100+b.month)-(a.year*100+a.month); })[0];
  var lastNet=lastRun?r2((lastRun.lines||[]).reduce(function(s,l){ return s+(l.net||0); },0)):0;
  var card=function(ic,lb,v,color){ return '<div class="kpi"><div class="kpi-ic" style="background:'+color+'1f;color:'+color+'">'+ic+'</div><div><div class="kpi-val" style="color:'+color+'">'+v+'</div><div class="kpi-lb">'+lb+'</div></div></div>'; };
  $('view').innerHTML=
    '<div class="card"><div class="card-h"><h2>📊 لوحة تقارير الموارد البشرية</h2>'+
      '<div><label style="display:inline">شهر التقرير</label> <input type="month" value="'+esc(hrMonth)+'" onchange="hrMonth=this.value;renderHRDash()"></div></div>'+
      '<div class="kpi-grid">'+

        card('📎','وثائق تنتهي قريباً',expiringDocs().length,'#8a6d0b')+
        (can('viewSalary')?card('💵','صافي آخر مسير رواتب',money(lastNet),'#1E6FA8'):'')+
      '</div>'+
    '</div>'+
    '<div class="card"><div class="card-h"><h2>📈 مركز تقارير الموارد البشرية الشامل</h2></div>'+
      '<div class="rep-grid">'+
        repCard('👥 تقرير الموظفين','repAll')+

/* ==================== السلف والقروض (Loans & Advances) ==================== */
var loanFilter='';
function loansList(){ DB.loans = DB.loans || []; return DB.loans; }
function newLoanNo(){ DB.nextLoanNo=(DB.nextLoanNo||1); return 'LN-'+String(DB.nextLoanNo++).padStart(4,'0'); }
/* المدفوع = مجموع أقساط مسيرات الرواتب المعتمدة/المقفلة لهذه السلفة + دفعات يدوية */
function loanPaid(l){
  var manual=(l.payments||[]).reduce(function(s,p){ return s+(p.amount||0); },0);
  var fromPayroll=0;
  (DB.payrolls||[]).forEach(function(r){ if(r.status==='مسودة') return; (r.lines||[]).forEach(function(line){ if(line.nationalId===l.nationalId){ /* الخصم العام؛ لا يربط بسلفة محددة تلقائياً */ } }); });
  return r2(manual);
}
function loanRemaining(l){ return r2((l.amount||0) - loanPaid(l)); }
function loanInstallment(l){ return (l.installments>0)? r2((l.amount||0)/l.installments) : (l.installmentAmount||0); }

function renderLoans(){
  var list=loansList().filter(function(l){ return !loanFilter || l.status===loanFilter; });
  var rows=loansList().length? list.map(function(l){
    var rem=loanRemaining(l);
    var stB= l.status==='مسدد'?'green': l.status==='ملغي'?'red':'gray';
    return '<tr><td class="num" dir="ltr"><b>'+esc(l.id)+'</b></td><td>'+esc(empName(l.nationalId)||l.nationalId)+'</td><td>'+esc(l.type||'سلفة')+'</td><td>'+esc(l.date||'—')+'</td>'+
      '<td class="num">'+money(l.amount)+'</td><td>'+(l.installments||'—')+'</td><td class="num">'+money(loanInstallment(l))+'</td><td>'+esc(l.firstMonth||'—')+'</td>'+
      '<td class="num"><b style="color:'+(rem>0?'#c47a1d':'#1a8a5a')+'">'+money(rem)+'</b></td><td><span class="badge '+stB+'">'+esc(l.status)+'</span></td>'+
      '<td style="white-space:nowrap"><button class="icon-btn" title="عرض/سداد" onclick="openLoan(\''+esc(l.id)+'\')">👁️</button>'+
      (can('delEmp')?' <button class="icon-btn danger" title="حذف" onclick="delLoan(\''+esc(l.id)+'\')">🗑️</button>':'')+'</td></tr>';
  }).join('') : '';
  $('view').innerHTML='<div class="card"><div class="card-h"><h2>💳 السلف والقروض</h2>'+
    '<div class="toolbar">'+(can('editSalary')?'<button class="btn btn-gold btn-sm" onclick="openLoanForm()">+ سلفة / قرض جديد</button>':'')+'</div></div>'+
    '<div style="max-width:260px;margin-bottom:12px"><label>تصفية حسب الحالة</label><select onchange="loanFilter=this.value;renderLoans()">'+
      ['<option value="">الكل</option>'].concat(['نشطة','مسدد','ملغي'].map(function(x){ return '<option'+(x===loanFilter?' selected':'')+'>'+x+'</option>'; })).join('')+'</select></div>'+
    (loansList().length? '<div class="tblwrap"><table><thead><tr><th>رقم السلفة</th><th>الموظف</th><th>النوع</th><th>التاريخ</th><th>القيمة</th><th>الأقساط</th><th>قيمة القسط</th><th>أول شهر خصم</th><th>الرصيد المتبقي</th><th>الحالة</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>'
      : '<div class="empty"><div class="empty-icon">💳</div><div>لا توجد سلف أو قروض بعد</div></div>')+
  '</div>';
}

function lnFetch(){ var nid=val('ln_nid').trim(); var e=nid?getEmp(nid):null; if(e){ $('ln_name').value=e.fullNameAr||''; } else { $('ln_name').value=''; if(nid) toast('لا يوجد موظف بهذا الرقم','error'); } }
function lnCalc(){ var amt=parseFloat(val('ln_amount'))||0; var inst=parseInt(val('ln_inst'),10)||1; if($('ln_instamt')) $('ln_instamt').value=(inst>0?r2(amt/inst):amt); }
function saveLoan(){
  if(!can('editSalary')) return toast('لا صلاحية','error');
  var nid=val('ln_nid').trim(); var e=nid?getEmp(nid):null; if(!e) return toast('اختر موظفاً مسجّلاً','error');
  var amt=parseFloat(val('ln_amount'))||0; if(amt<=0) return toast('أدخل قيمة صحيحة للسلفة','error');
  var inst=parseInt(val('ln_inst'),10)||1;
  var rec={ id:newLoanNo(), empId:e.empId, nationalId:nid, type:val('ln_type'), date:val('ln_date'), amount:amt, method:val('ln_method'),
    installments:inst, installmentAmount:(inst>0?r2(amt/inst):amt), firstMonth:val('ln_first'), notes:val('ln_notes').trim(),
    status:'نشطة', payments:[], created:new Date().toISOString() };
  loansList().unshift(rec);
  logChange(e,'إضافة سلفة/قرض', rec.id+' — '+money(amt)+' على '+inst+' قسط');
  saveDB(); closeModal(); toast('✓ تم تسجيل السلفة '+rec.id,'success'); renderLoans();
}
function openLoan(id){
  var l=loansList().find(function(x){ return x.id===id; }); if(!l) return;
  var pays=(l.payments||[]).map(function(p,i){ return '<tr><td>'+esc(p.date)+'</td><td class="num">'+money(p.amount)+'</td><td>'+esc(p.note||'—')+'</td>'+(can('editSalary')?'<td><button class="icon-btn danger" onclick="delLoanPayment(\''+id+'\','+i+')">×</button></td>':'<td></td>')+'</tr>'; }).join('');
  var rem=loanRemaining(l);
  modal('💳 سلفة '+esc(l.id)+' — '+esc(empName(l.nationalId)),
    '<div class="profile-fields">'+
      pf('النوع',l.type)+pf('التاريخ',l.date)+pf('القيمة',money(l.amount))+pf('طريقة السداد',l.method)+
      pf('عدد الأقساط',l.installments)+pf('قيمة القسط',money(loanInstallment(l)))+pf('أول شهر للخصم',l.firstMonth)+
      pf('المسدَّد',money(loanPaid(l)))+pf('الرصيد المتبقي',money(rem))+pf('الحالة',l.status)+
    '</div>'+
    (can('editSalary')&&l.status==='نشطة'? '<div style="margin-top:12px;border-top:1px solid var(--line);padding-top:10px"><div style="font-weight:800;color:var(--navy);margin-bottom:8px">➕ تسجيل دفعة/قسط</div>'+
      '<div class="grid g3"><div><label>التاريخ</label><input id="lp_date" type="date" value="'+today().iso+'"></div>'+
      '<div><label>المبلغ</label><input id="lp_amt" type="number" value="'+loanInstallment(l)+'"></div>'+
      '<div><label>ملاحظة</label><input id="lp_note"></div></div>'+
      '<button class="btn btn-primary btn-sm" style="margin-top:10px" onclick="addLoanPayment(\''+id+'\')">💾 تسجيل الدفعة</button>'+
      (rem>0?'':'<span class="hint" style="margin-inline-start:8px">✓ مسدّدة بالكامل</span>')+'</div>':'')+
    '<div style="margin-top:14px"><div style="font-weight:800;color:var(--navy);margin-bottom:6px">📜 سجل الدفعات</div>'+
      (pays?'<div class="tblwrap"><table><thead><tr><th>التاريخ</th><th>المبلغ</th><th>ملاحظة</th><th></th></tr></thead><tbody>'+pays+'</tbody></table></div>':'<div class="hint">لا توجد دفعات</div>')+'</div>',
    '<button class="btn btn-ghost" onclick="closeModal()">إغلاق</button>'+
    (can('editSalary')&&l.status==='نشطة'?'<button class="btn btn-danger" onclick="cancelLoan(\''+id+'\')">🚫 إلغاء السلفة</button>':''));
}
function addLoanPayment(id){
  if(!can('editSalary')) return toast('لا صلاحية','error');
  var l=loansList().find(function(x){ return x.id===id; }); if(!l) return;
  var amt=parseFloat(val('lp_amt'))||0; if(amt<=0) return toast('أدخل مبلغاً صحيحاً','error');
  l.payments=l.payments||[]; l.payments.push({date:val('lp_date'),amount:amt,note:val('lp_note').trim()});
  if(loanRemaining(l)<=0){ l.status='مسدد'; }
  logChange(getEmp(l.nationalId),'سداد قسط سلفة', l.id+' — '+money(amt));
  saveDB(); toast('✓ تم تسجيل الدفعة'+(l.status==='مسدد'?' — تم السداد بالكامل':''),'success'); openLoan(id); renderLoans();
}
function delLoanPayment(id, idx){ var l=loansList().find(function(x){ return x.id===id; }); if(!l) return; if(!confirm('حذف هذه الدفعة؟')) return; l.payments.splice(idx,1); if(l.status==='مسدد'&&loanRemaining(l)>0) l.status='نشطة'; saveDB(); openLoan(id); renderLoans(); }
function cancelLoan(id){ if(!can('editSalary')) return toast('لا صلاحية','error'); var l=loansList().find(function(x){ return x.id===id; }); if(!l) return; if(!confirm('إلغاء السلفة '+id+'؟')) return; l.status='ملغي'; logChange(getEmp(l.nationalId),'إلغاء سلفة',l.id); saveDB(); toast('🚫 تم الإلغاء','success'); openLoan(id); renderLoans(); }
function delLoan(id){ if(!can('delEmp')) return toast('لا صلاحية للحذف','error'); if(!confirm('حذف السلفة '+id+' نهائياً؟')) return; DB.loans=loansList().filter(function(x){ return x.id!==id; }); saveDB(); toast('🗑️ تم الحذف','success'); renderLoans(); }
/* إجمالي أقساط الشهر لموظف (للربط بالرواتب) */
function loanMonthlyDue(nid, ym){
  return r2(loansList().filter(function(l){ return l.nationalId===nid && l.status==='نشطة' && l.method==='خصم من الراتب' && (l.firstMonth||'') <= ym && loanRemaining(l)>0; })
    .reduce(function(s,l){ return s + Math.min(loanInstallment(l), loanRemaining(l)); }, 0));
}

/* ==================== إنهاء الخدمة (Offboarding) ==================== */
var OFF_TYPES=['استقالة','فصل','انتهاء عقد','تقاعد','وفاة','إنهاء بالتراضي'];
var OFF_CLEAR=['تقنية المعلومات','المالية','الموارد البشرية','المدير المباشر','المستودع/العهد','الأمن'];
function offList(){ DB.offboardings=DB.offboardings||[]; return DB.offboardings; }
function newOffNo(){ DB.nextOffNo=(DB.nextOffNo||1); return 'OFF-'+String(DB.nextOffNo++).padStart(4,'0'); }
function empLeaveBalanceTotal(nid){ return leaveTypesList().reduce(function(s,t){ var r=(t.quota||0)-leaveUsed(nid,t.name); return s+(r>0?r:0); },0); }
function empOpenLoans(nid){ return (DB.loans||[]).filter(function(l){ return l.nationalId===nid && l.status==='نشطة' && loanRemaining(l)>0; }); }
function empOpenLoansTotal(nid){ return r2(empOpenLoans(nid).reduce(function(s,l){ return s+loanRemaining(l); },0)); }
function offGet(id){ return offList().find(function(x){ return x.id===id; }); }

function renderOffboard(){

    var stB= o.fileStatus==='مغلق'?'red': o.fileStatus==='جاهز للإغلاق'?'green':'gray';

      '<td style="white-space:nowrap"><button class="icon-btn" title="فتح" onclick="openOff(\''+esc(o.id)+'\')">👁️</button>'+
      (can('delEmp')?' <button class="icon-btn danger" title="حذف" onclick="delOff(\''+esc(o.id)+'\')">🗑️</button>':'')+'</td></tr>';
  }).join('');
  $('view').innerHTML='<div class="card"><div class="card-h"><h2>🚪 إنهاء الخدمة (Offboarding)</h2>'+
    '<div class="toolbar">'+(can('editEmp')?'<button class="btn btn-gold btn-sm" onclick="openOffForm()">+ بدء إجراء إنهاء خدمة</button>':'')+'</div></div>'+
    (offList().length? '<div class="tblwrap"><table><thead><tr><th>رقم الإجراء</th><th>الموظف</th><th>النوع</th><th>آخر يوم عمل</th><th>حالة الملف</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>'
      : '<div class="empty"><div class="empty-icon">🚪</div><div>لا توجد إجراءات إنهاء خدمة</div></div>')+

function ofFetch(){ var nid=val('of_nid').trim(); var e=nid?getEmp(nid):null; if(e){ $('of_name').value=e.fullNameAr||''; } else { $('of_name').value=''; if(nid) toast('لا يوجد موظف بهذا الرقم','error'); } }
function saveOff(){

function offGates(o){
  var loansOk = empOpenLoansTotal(o.nationalId)<=0;   // تسوية السلف والقروض
  var custodyOk = o.handoverDone===true;                // تسليم العهد
  var hrOk = o.hrApproved===true;                        // اعتماد الموارد البشرية
  var finOk = o.financeApproved===true;                 // اعتماد الإدارة المالية
  return {loansOk:loansOk, custodyOk:custodyOk, hrOk:hrOk, finOk:finOk, all:(loansOk&&custodyOk&&hrOk&&finOk)};
}

      '<div><label>المستحقات النهائية</label><input id="ofd_dues" type="number" value="'+(o.finalDues||0)+'" '+dis+' onchange="offField(\''+id+'\',\'finalDues\',parseFloat(this.value)||0)"></div>'+
      '<div><label>الخصومات</label><input id="ofd_ded" type="number" value="'+(o.deductions||0)+'" '+dis+' onchange="offField(\''+id+'\',\'deductions\',parseFloat(this.value)||0)"></div>'+

    '</div>'+
    '<div class="att-metric" style="margin-top:10px"><span>صافي المخالصة المالية (المستحقات − الخصومات − السلف المتبقية)</span><b style="color:var(--navy)">'+money(r2((o.finalDues||0)-(o.deductions||0)-openLoans))+' د.أ</b></div>'+
    '<div class="grid g2" style="margin-top:12px">'+
      '<div><label>مقابلة نهاية الخدمة</label><select '+dis+' onchange="offField(\''+id+'\',\'exitInterviewDone\',this.value===\'تمت\')">'+selOpts(['لم تتم','تمت'], o.exitInterview&&o.exitInterview.done?'تمت':'لم تتم')+'</select></div>'+

      '<div class="tblwrap"><table><thead><tr><th>الإدارة</th><th>مُخلى</th><th>ملاحظة</th><th>بواسطة</th></tr></thead><tbody>'+clearRows+'</tbody></table></div></div>'+

      '<div class="grid g2">'+
        '<label class="off-gate">'+chk(g.custodyOk)+' تسليم العهد <input type="checkbox" '+(o.handoverDone?'checked':'')+' '+dis+' onchange="offField(\''+id+'\',\'handoverDone\',this.checked)"></label>'+
        '<label class="off-gate">'+chk(g.loansOk)+' تسوية السلف والقروض (متبقٍ: '+money(openLoans)+')</label>'+

        '<label class="off-gate">'+chk(g.finOk)+' اعتماد الإدارة المالية <input type="checkbox" '+(o.financeApproved?'checked':'')+' '+dis+' onchange="offField(\''+id+'\',\'financeApproved\',this.checked)"></label>'+
      '</div>'+

    '</div>',
    '<button class="btn btn-ghost" onclick="closeModal()">إغلاق النافذة</button>'+
